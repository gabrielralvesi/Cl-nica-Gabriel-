<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicFlow Pro - Gestão de Clínica</title>
    
    <!-- Fontes modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ===== VARIÁVEIS ===== */
        :root {
            --primary-50: #ecfdf5;
            --primary-100: #d1fae5;
            --primary-200: #a7f3d0;
            --primary-300: #6ee7b7;
            --primary-400: #34d399;
            --primary-500: #10b981;
            --primary-600: #059669;
            --primary-700: #047857;
            --primary-800: #065f46;
            --primary-900: #064e3b;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --gray-950: #0f172a;
            
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --error: #ef4444;
            --error-light: #fee2e2;
            --info: #3b82f6;
            --info-light: #dbeafe;
            
            --cassems: #10b981;
            --cassems-light: #d1fae5;
            --particular: #f59e0b;
            --particular-light: #fef3c7;
            --unimed: #3b82f6;
            --unimed-light: #dbeafe;
            --outros: #8b5cf6;
            --outros-light: #ede9fe;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        .light-mode {
            --bg-primary: var(--gray-50);
            --bg-secondary: white;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            --card-bg: white;
            --hover-bg: var(--gray-50);
        }

        body {
            --bg-primary: var(--gray-950);
            --bg-secondary: var(--gray-900);
            --text-primary: white;
            --text-secondary: var(--gray-400);
            --border: var(--gray-800);
            --card-bg: var(--gray-900);
            --hover-bg: var(--gray-800);
            
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .hidden { display: none !important; }

        /* ===== LAYOUT ===== */
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
        }

        .header-content {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .logo-text p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .date-display {
            padding: 0.5rem 1rem;
            background: var(--hover-bg);
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .theme-toggle {
            padding: 0.5rem;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--primary-500);
            color: var(--primary-500);
        }

        /* ===== NAVEGAÇÃO ===== */
        .nav-tabs {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }

        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
        }

        .nav-tab {
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }

        .nav-tab i { margin-right: 0.5rem; }

        .nav-tab:hover { color: var(--primary-500); }

        .nav-tab.active {
            color: var(--primary-500);
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-500);
        }

        /* ===== MAIN ===== */
        .main-content {
            flex: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-500);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .card-title i {
            color: var(--primary-500);
            margin-right: 0.5rem;
        }

        /* ===== GRIDS ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

        @media (max-width: 1024px) {
            .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .main-content { padding: 1rem; }
            .header-content { flex-direction: column; align-items: flex-start; }
        }

        /* ===== STAT CARDS ===== */
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-500);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-50);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-600);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-detail {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        /* ===== PROGRESS ===== */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--hover-bg);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-500);
            border-radius: var(--radius-full);
            transition: width 0.3s;
        }

        .circular-progress {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(var(--primary-500) 0deg, var(--hover-bg) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .circular-progress::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--card-bg);
        }

        .progress-value {
            position: relative;
            z-index: 1;
            font-weight: 600;
            color: var(--primary-500);
        }

        /* ===== BOTÕES ===== */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-lg);
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: transparent;
            border-color: var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
            border-color: var(--primary-500);
            color: var(--primary-500);
        }

        .btn-ai {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
        }

        .btn-ai:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-danger {
            background: var(--error-light);
            color: var(--error-500);
        }

        .btn-danger:hover {
            background: var(--error-500);
            color: white;
        }

        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }

        /* ===== FORMULÁRIOS ===== */
        .form-group { margin-bottom: 1.5rem; }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .input-group .form-control { flex: 1; }

        /* ===== AI SUGGESTIONS ===== */
        .ai-suggestions {
            margin-top: 1rem;
            padding: 1rem;
            background: linear-gradient(135deg, #6366f110, #8b5cf610);
            border: 1px solid #8b5cf640;
            border-radius: var(--radius-lg);
        }

        .ai-suggestions h4 {
            color: #8b5cf6;
            margin: 0 0 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ai-suggestions h4 i { font-size: 1.2rem; }

        .suggestion-chip {
            display: inline-block;
            padding: 0.5rem 1rem;
            margin: 0.25rem;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }

        .ai-loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== TIMELINE ===== */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: -1.65rem;
            top: 0.5rem;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: var(--primary-500);
            border: 2px solid var(--card-bg);
        }

        .timeline-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .timeline-content { color: var(--text-primary); }

        /* ===== MODAIS ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-2xl);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        /* ===== LISTAS ===== */
        .list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .list-item {
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            transition: all 0.2s;
        }

        .list-item:hover {
            border-color: var(--primary-500);
            transform: translateX(2px);
        }

        /* ===== PILLS ===== */
        .pill {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--hover-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .pill-success {
            background: var(--success-light);
            color: var(--success);
            border-color: transparent;
        }

        .pill-warning {
            background: var(--warning-light);
            color: var(--warning);
            border-color: transparent;
        }

        .pill-error {
            background: var(--error-light);
            color: var(--error);
            border-color: transparent;
        }

        .pill-cassems {
            background: var(--cassems-light);
            color: var(--cassems);
        }

        .pill-particular {
            background: var(--particular-light);
            color: var(--particular);
        }

        /* ===== AVATAR ===== */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-500);
        }

        .avatar-lg { width: 80px; height: 80px; }
        .avatar-sm { width: 32px; height: 32px; }

        .avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-100);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-600);
            font-weight: 600;
        }

        /* ===== AGENDA ===== */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--hover-bg);
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        .schedule-slot {
            padding: 1rem;
            border-radius: var(--radius-lg);
            transition: all 0.2s;
            cursor: pointer;
        }

        .slot-cassems {
            background: var(--cassems-light);
            border-left: 4px solid var(--cassems);
        }

        .slot-particular {
            background: var(--particular-light);
            border-left: 4px solid var(--particular);
        }

        .slot-empty {
            background: var(--hover-bg);
            border-left: 4px solid var(--border);
            opacity: 0.7;
        }

        .slot-empty:hover {
            opacity: 1;
            background: var(--primary-100);
        }

        /* ===== TOKEN COUNTER ===== */
        .token-counter {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--hover-bg);
            border-radius: var(--radius-lg);
            margin: 1rem 0;
        }

        .token-progress {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: var(--radius-full);
        }

        .token-progress-fill {
            height: 100%;
            background: var(--warning-500);
            border-radius: var(--radius-full);
            transition: width 0.3s;
        }

        /* ===== ALERTAS ===== */
        .alert {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            z-index: 2000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .alert-success {
            border-color: var(--success);
            background: var(--success-light);
            color: var(--success);
        }

        /* ===== SHORTCUTS ===== */
        .shortcuts-hint {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 0.75rem 1.5rem;
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .shortcuts-panel {
            position: fixed;
            bottom: 5rem;
            right: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            width: 320px;
            box-shadow: var(--shadow-xl);
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .shortcut-key {
            padding: 0.25rem 0.5rem;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: monospace;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--hover-bg); }
        ::-webkit-scrollbar-thumb { background: var(--gray-600); border-radius: var(--radius-full); }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-500); }
    </style>
</head>
<body>
    <div id="app"></div>
    <input type="file" id="importFile" accept=".json" style="display:none">

    <script>
        // ============================================
        // CONFIGURAÇÕES
        // ============================================
        const APP_VERSION = '13.0.0';
        const CLINIC_NAME = "ClinicFlow Pro";
        const CLINIC_SUBTITLE = "Gestão de Clínica Profissional";
        const CLINIC_CRFA = "CRFa 5-13766";

        // SUA CHAVE API DO GEMINI (gratuita - pegue em https://aistudio.google.com/apikey)
        const GEMINI_API_KEY = "AIzaSyA0WulpOSIW9YgQ80_5JvRXdcqQceXqp-8"; // Substitua pela sua chave

        const STORAGE_KEYS = {
            PATIENTS: "clinicflow_patients_v13",

            AI_SETTINGS: "clinicflow_ai_settings"
        };

        const SERVICE_TYPES = {
            cassems: { label: 'Cassems', color: 'cassems', class: 'slot-cassems', pill: 'pill-cassems' },
            particular: { label: 'Particular', color: 'particular', class: 'slot-particular', pill: 'pill-particular' },

        };

        const DEFAULT_TIMES = [
            "07:00", "07:40", "08:20", "09:00", "09:40", "10:20", "11:00",
            "13:00", "13:40", "14:20", "15:00", "15:40", "16:20", "17:00", "17:40"
        ];

        const CASSEMS_DEFAULT_VALUE = 26;

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let openedPatientId = null;
        let alertTimeout = null;
        let currentTokenSessionId = null;
        let debtFilterActive = false;
        let notificationsEnabled = false;
        let notificationInterval = null;
        let currentPhotoFile = null;

        // ============================================
        // UTILS
        // ============================================
        const $ = (id) => document.getElementById(id);

        const Utils = {
            uid() {
                return Date.now().toString(36) + Math.random().toString(36).substring(2);
            },

            todayISO() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            },

            nowTime() {
                const d = new Date();
                return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            },

            parseMoney(val) {
                if (!val) return 0;
                return Number(String(val).replace(/\./g, '').replace(',', '.')) || 0;
            },

            fmtMoney(val) {
                return Number(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            },

            escapeHtml(str) {
                return String(str || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            },

            recurKey(day, time) { return `${day}|${time}`; },

            addDays(dateStr, days) {
                const date = new Date(dateStr + 'T12:00:00');
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            },

            showAlert(message, type = 'success', duration = 3000) {
                if (alertTimeout) clearTimeout(alertTimeout);
                
                const alert = document.createElement('div');
                alert.className = `alert alert-${type}`;
                alert.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-exclamation-circle'}"></i>
                        <span>${message}</span>
                    </div>
                `;
                
                document.body.appendChild(alert);
                
                alertTimeout = setTimeout(() => {
                    if (alert.parentNode) alert.remove();
                }, duration);
            },

            formatDate(dateStr) {
                return new Date(dateStr).toLocaleDateString('pt-BR');
            }
        };

        // ============================================
        // AI SERVICE (GEMINI)
        // ============================================
        const AIService = {
            apiKey: GEMINI_API_KEY,
            apiUrl: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent',

            async generateText(prompt) {
                if (!this.apiKey || this.apiKey === "COLOQUE_SUA_CHAVE_AQUI") {
                    Utils.showAlert('Configure a chave da API Gemini nas configurações', 'warning');
                    return null;
                }

                try {
                    aiLoading = true;
                    this.updateLoadingState(true);

                    const response = await fetch(`${this.apiUrl}?key=${this.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: prompt
                                }]
                            }],
                            generationConfig: {
                                temperature: 0.7,
                                maxOutputTokens: 500
                            }
                        })
                    });

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        throw new Error('Resposta inválida da API');
                    }
                } catch (error) {
                    console.error('Erro na API Gemini:', error);
                    Utils.showAlert('Erro ao conectar com a IA', 'error');
                    return null;
                } finally {
                    aiLoading = false;
                    this.updateLoadingState(false);
                }
            },

            updateLoadingState(loading) {
                const aiButtons = document.querySelectorAll('.ai-loading-indicator');
                aiButtons.forEach(btn => {
                    if (loading) {
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                        btn.disabled = true;
                    } else {
                        btn.innerHTML = '<i class="fas fa-robot"></i> IA';
                        btn.disabled = false;
                    }
                });
            },

            async suggestEvolucao(patientId, currentText = '') {
                const patient = Patients.getById(patientId);
                const evolucoes = Evolucoes.getByPatient(patientId);
                const historico = evolucoes.slice(0, 3).map(e => `- ${e.date}: ${e.text}`).join('\n');
                
                const prompt = `Você é um assistente de fonoaudiologia infantil. Ajude o profissional a escrever uma evolução clínica.
                
Paciente: ${patient?.name || 'Paciente'}
Idade: Calcular a partir da data de nascimento se disponível
Tipo de atendimento: ${patient?.serviceType || 'Não especificado'}

Histórico recente:
${historico || 'Nenhuma evolução anterior'}

Texto atual do profissional:
${currentText || 'Ainda não escrito'}

Sugira 3 opções de evolução clínica profissional, cada uma com aproximadamente 3 frases, focando em:
- Progresso do paciente
- Atividades realizadas
- Próximos passos
- Observações relevantes

Formato: Apenas as sugestões numeradas, sem explicações adicionais.`;

                return await this.generateText(prompt);
            },

            async improveEvolucao(text) {
                const prompt = `Melhore o seguinte texto de evolução clínica, corrigindo erros e tornando mais profissional, mas mantendo o significado:

Texto: "${text}"

Forneça apenas a versão melhorada, sem explicações adicionais.`;

                return await this.generateText(prompt);
            },

            async summarizeEvolucao(text) {
                const prompt = `Resuma a seguinte evolução clínica em 2 frases concisas:

Texto: "${text}"

Forneça apenas o resumo, sem explicações adicionais.`;

                return await this.generateText(prompt);
            },

            async extractKeyPoints(text) {
                const prompt = `Extraia os pontos-chave da seguinte evolução clínica:

Texto: "${text}"

Liste os pontos-chave em formato de tópicos simples, um por linha.`;

                return await this.generateText(prompt);
            }
        };

        // ============================================
        // STORAGE (resumido para manter o código menor)
        // ============================================
        const Storage = {
            save(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                    return true;
                } catch (e) {
                    Utils.showAlert('Erro ao salvar dados', 'error');
                    return false;
                }
            },

            load(key, defaultValue = null) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : defaultValue;
                } catch {
                    return defaultValue;
                }
            },

            remove(key) { localStorage.removeItem(key); },

            exportAll() {
                try {
                    const dados = {
                        pacientes: Patients.getAll(),
                        sessoes: Sessions.getAll(),
                        agenda: Schedule.get(),
                        tokens: Tokens.getAll(),
                        fotos: Photos.getAll(),
                        evolucoes: Evolucoes.getAll(),
                        dataExport: new Date().toISOString(),
                        versao: APP_VERSION
                    };
                    
                    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_clinicflow_${Utils.todayISO()}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    Utils.showAlert('Backup exportado!', 'success');
                } catch (erro) {
                    console.error(erro);
                    Utils.showAlert('Erro ao exportar', 'error');
                }
            },

            importFromFile(file, callback) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const dados = JSON.parse(e.target.result);
                        
                        if (dados.pacientes) this.save(STORAGE_KEYS.PATIENTS, dados.pacientes);
                        if (dados.sessoes) this.save(STORAGE_KEYS.SESSIONS, dados.sessoes);
                        if (dados.agenda) this.save(STORAGE_KEYS.SCHEDULE, dados.agenda);
                        if (dados.tokens) this.save(STORAGE_KEYS.TOKENS, dados.tokens);
                        if (dados.fotos) this.save(STORAGE_KEYS.PHOTOS, dados.fotos);
                        if (dados.evolucoes) this.save(STORAGE_KEYS.EVOLUCOES, dados.evolucoes);
                        
                        Utils.showAlert('Dados importados!', 'success');
                        if (callback) setTimeout(callback, 1500);
                        
                    } catch (erro) {
                        console.error(erro);
                        Utils.showAlert('Arquivo inválido', 'error');
                    }
                };
                reader.readAsText(file);
            },

            checkVersion() {
                const lastVersion = this.load(STORAGE_KEYS.VERSION);
                if (lastVersion !== APP_VERSION) {
                    this.save(STORAGE_KEYS.VERSION, APP_VERSION);
                }
            }
        };

        // ============================================
        // PHOTOS
        // ============================================
        const Photos = {
            getAll() { return Storage.load(STORAGE_KEYS.PHOTOS, {}); },
            save(photos) { Storage.save(STORAGE_KEYS.PHOTOS, photos); },
            get(patientId) { return this.getAll()[patientId] || null; },
            set(patientId, photoData) {
                const photos = this.getAll();
                photos[patientId] = photoData;
                this.save(photos);
            },
            remove(patientId) {
                const photos = this.getAll();
                delete photos[patientId];
                this.save(photos);
            }
        };

        // ============================================
        // PATIENTS MODEL
        // ============================================
        const Patients = {
            getAll() { return Storage.load(STORAGE_KEYS.PATIENTS, []); },
            save(patients) { Storage.save(STORAGE_KEYS.PATIENTS, patients); },

            add(data) {
                const patients = this.getAll();
                const newPatient = {
                    id: Utils.uid(),
                    ...data,
                    anamnese: { queixa: '', historico: '', obs: '' },
                    createdAt: new Date().toISOString()
                };
                patients.push(newPatient);
                this.save(patients);
                return newPatient;
            },

            update(id, updates) {
                const patients = this.getAll();
                const index = patients.findIndex(p => p.id === id);
                if (index !== -1) {
                    patients[index] = { ...patients[index], ...updates };
                    this.save(patients);
                    return patients[index];
                }
                return null;
            },

            delete(id) {
                const patients = this.getAll().filter(p => p.id !== id);
                this.save(patients);
            },

            getById(id) { return this.getAll().find(p => p.id === id); },

            search(term) {
                const patients = this.getAll();
                if (!term) return patients;
                return patients.filter(p => p.name.toLowerCase().includes(term.toLowerCase()));
            },

            getAnamnese(id) {
                const p = this.getById(id);
                return p?.anamnese || { queixa: '', historico: '', obs: '' };
            },

            saveAnamnese(id, data) {
                return this.update(id, { anamnese: data });
            },

            isCassems(id) {
                const p = this.getById(id);
                return p?.serviceType === 'cassems';
            },

            getDefaultValue(id) {
                const p = this.getById(id);
                if (p?.serviceType === 'cassems') return CASSEMS_DEFAULT_VALUE;
                return p?.defaultValue || 0;
            }
        };

        // ============================================
        // SESSIONS MODEL
        // ============================================
        const Sessions = {
            getAll() { return Storage.load(STORAGE_KEYS.SESSIONS, []); },
            save(sessions) { Storage.save(STORAGE_KEYS.SESSIONS, sessions); },

            add(data) {
                const sessions = this.getAll();
                const newSession = { id: Utils.uid(), ...data };
                sessions.push(newSession);
                this.save(sessions);
                return newSession;
            },

            update(id, updates) {
                const sessions = this.getAll();
                const index = sessions.findIndex(s => s.id === id);
                if (index !== -1) {
                    sessions[index] = { ...sessions[index], ...updates };
                    this.save(sessions);
                    return sessions[index];
                }
                return null;
            },

            delete(id) {
                const sessions = this.getAll().filter(s => s.id !== id);
                this.save(sessions);
            },

            getById(id) { return this.getAll().find(s => s.id === id); },
            getByDate(date) { return this.getAll().filter(s => s.date === date); },
            getByPatient(patientId) { return this.getAll().filter(s => s.patientId === patientId); },
            getByMonth(month) { return this.getAll().filter(s => s.date.startsWith(month)); },

            toggleDid(id) {
                const session = this.getById(id);
                if (!session) return null;
                const newDid = session.did === 'realizou' ? 'nao' : 'realizou';
                return this.update(id, {
                    did: newDid,
                    just: newDid === 'nao' ? (session.just || 'nao_justificada') : 'na'
                });
            },

            togglePaid(id) {
                const session = this.getById(id);
                if (!session) return null;
                const newPaid = session.paid === 'pago' ? 'nao_pago' : 'pago';
                return this.update(id, { paid: newPaid });
            },

            updateValue(id, value) { return this.update(id, { value }); },

            getPatientStats(patientId) {
                const sessions = this.getByPatient(patientId);
                return {
                    total: sessions.length,
                    realizadas: sessions.filter(s => s.did === 'realizou').length,
                    faltas: sessions.filter(s => s.did === 'nao').length,
                    debt: sessions.filter(s => s.paid !== 'pago').reduce((sum, s) => sum + (Number(s.value) || 0), 0)
                };
            },

            getMonthStats(month) {
                const sessions = this.getByMonth(month);
                const realizadas = sessions.filter(s => s.did === 'realizou');
                return {
                    total: sessions.length,
                    realizadas: realizadas.length,
                    faltas: sessions.filter(s => s.did === 'nao').length,
                    faturamento: realizadas.reduce((sum, s) => sum + (Number(s.value) || 0), 0),
                    aReceber: sessions.filter(s => s.paid !== 'pago').reduce((sum, s) => sum + (Number(s.value) || 0), 0)
                };
            }
        };

        // ============================================
        // SCHEDULE MODEL
        // ============================================
        const Schedule = {
            get() { return Storage.load(STORAGE_KEYS.SCHEDULE, { times: DEFAULT_TIMES, recurring: {} }); },
            save(schedule) { Storage.save(STORAGE_KEYS.SCHEDULE, schedule); },
            getTimes() { return this.get().times || []; },

            addTime(time) {
                const schedule = this.get();
                if (!schedule.times.includes(time)) {
                    schedule.times.push(time);
                    schedule.times.sort();
                    this.save(schedule);
                    return true;
                }
                return false;
            },

            removeTime(time) {
                const schedule = this.get();
                schedule.times = schedule.times.filter(t => t !== time);
                this.save(schedule);
            },

            resetTimes() {
                const schedule = this.get();
                schedule.times = DEFAULT_TIMES;
                this.save(schedule);
            },

            getRecurring() { return this.get().recurring || {}; },

            addRecurring(day, time, patientId, serviceType) {
                const schedule = this.get();
                if (!schedule.recurring) schedule.recurring = {};
                const key = Utils.recurKey(day, time);
                schedule.recurring[key] = { patientId, serviceType, startDate: Utils.todayISO() };
                this.save(schedule);
            },

            removeRecurring(day, time) {
                const schedule = this.get();
                const key = Utils.recurKey(day, time);
                if (schedule.recurring) {
                    delete schedule.recurring[key];
                    this.save(schedule);
                }
            },

            getByDayTime(day, time) {
                const recurring = this.getRecurring();
                const key = Utils.recurKey(day, time);
                return recurring[key] || null;
            },

            removeByPatient(patientId) {
                const schedule = this.get();
                if (schedule.recurring) {
                    Object.keys(schedule.recurring).forEach(key => {
                        if (schedule.recurring[key].patientId === patientId) {
                            delete schedule.recurring[key];
                        }
                    });
                    this.save(schedule);
                }
            },

            getUpcoming(limit = 5) {
                const agora = Utils.nowTime();
                const refDay = new Date().getDay();
                const recurring = this.getRecurring();
                const patients = Patients.getAll();
                const result = [];
                
                Object.entries(recurring).forEach(([key, entry]) => {
                    const [day, time] = key.split('|');
                    const dayNum = parseInt(day);
                    const patient = patients.find(p => p.id === entry.patientId);
                    
                    let daysToAdd = dayNum - refDay;
                    if (daysToAdd < 0) daysToAdd += 7;
                    if (daysToAdd === 0 && time < agora) daysToAdd += 7;
                    
                    const nextDate = new Date();
                    nextDate.setDate(nextDate.getDate() + daysToAdd);
                    
                    result.push({
                        date: nextDate,
                        time,
                        patient: patient?.name || '?',
                        patientId: entry.patientId,
                        days: daysToAdd
                    });
                });
                
                return result.sort((a, b) => a.days - b.days).slice(0, limit);
            }
        };

        // ============================================
        // TOKENS MODEL
        // ============================================
        const Tokens = {
            getAll() { return Storage.load(STORAGE_KEYS.TOKENS, {}); },
            save(tokens) { Storage.save(STORAGE_KEYS.TOKENS, tokens); },
            getBySession(sessionId) { return this.getAll()[sessionId] || null; },

            register(sessionId, data) {
                const tokens = this.getAll();
                tokens[sessionId] = { ...data, registeredAt: new Date().toISOString() };
                this.save(tokens);
                return tokens[sessionId];
            },

            updateStatus(tokenId, status) {
                const tokens = this.getAll();
                if (tokens[tokenId]) {
                    tokens[tokenId].status = status;
                    this.save(tokens);
                    return true;
                }
                return false;
            },

            delete(tokenId) {
                const tokens = this.getAll();
                delete tokens[tokenId];
                this.save(tokens);
            },

            deleteBySession(sessionId) {
                const tokens = this.getAll();
                delete tokens[sessionId];
                this.save(tokens);
            },

            addManual(patientId, month) {
                const [ano, mes] = month.split('-');
                const data = `${ano}-${mes}-01`;
                const id = Utils.uid();
                const tokens = this.getAll();
                
                tokens[id] = {
                    id,
                    patientId,
                    date: data,
                    code: '',
                    status: 'pendente',
                    manual: true,
                    registeredAt: new Date().toISOString()
                };
                
                this.save(tokens);
                return tokens[id];
            },

            getByPatient(patientId) {
                const tokens = this.getAll();
                const sessions = Sessions.getAll();
                const result = [];
                
                Object.entries(tokens).forEach(([id, token]) => {
                    const session = sessions.find(s => s.id === id);
                    if (session && session.patientId === patientId) {
                        result.push({ id, ...token, sessionDate: session.date });
                    } else if (!session && token.patientId === patientId) {
                        result.push({ id, ...token });
                    }
                });
                
                return result.sort((a, b) => b.date.localeCompare(a.date));
            },

            countByPatient(patientId, status, month = null) {
                const tokens = this.getByPatient(patientId);
                const hoje = new Date();
                const mesAlvo = month || `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
                
                return tokens.filter(t => {
                    if (status && t.status !== status) return false;
                    const dataToken = new Date(t.date + 'T12:00:00');
                    const mesToken = `${dataToken.getFullYear()}-${String(dataToken.getMonth() + 1).padStart(2, '0')}`;
                    return mesToken === mesAlvo;
                }).length;
            },

            countTotalEnviados(month = null) {
                const tokens = this.getAll();
                const hoje = new Date();
                const mesAlvo = month || `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
                
                return Object.values(tokens).filter(t => {
                    if (t.status !== 'enviado') return false;
                    const dataToken = new Date(t.date + 'T12:00:00');
                    const mesToken = `${dataToken.getFullYear()}-${String(dataToken.getMonth() + 1).padStart(2, '0')}`;
                    return mesToken === mesAlvo;
                }).length;
            },

            verificarZerarMensal() {
                const hoje = new Date();
                const dia = hoje.getDate();
                const mes = hoje.getMonth();
                const ano = hoje.getFullYear();
                
                const ultimoReset = Storage.load(STORAGE_KEYS.ULTIMO_RESET);
                const chaveReset = `${ano}-${mes}`;
                
                if (dia === 1 && ultimoReset !== chaveReset) {
                    const tokens = this.getAll();
                    const tokensReset = {};
                    
                    Object.entries(tokens).forEach(([id, token]) => {
                        if (token.status === 'problema') {
                            tokensReset[id] = token;
                        }
                    });
                    
                    this.save(tokensReset);
                    Storage.save(STORAGE_KEYS.ULTIMO_RESET, chaveReset);
                    
                    Utils.showAlert('Tokens reiniciados', 'info');
                    return true;
                }
                return false;
            }
        };

        // ============================================
        // EVOLUCOES MODEL
        // ============================================
        const Evolucoes = {
            getAll() { return Storage.load(STORAGE_KEYS.EVOLUCOES, {}); },
            save(evolucoes) { Storage.save(STORAGE_KEYS.EVOLUCOES, evolucoes); },

            getByPatient(patientId) { return this.getAll()[patientId] || []; },

            add(patientId, data) {
                const evolucoes = this.getAll();
                if (!evolucoes[patientId]) evolucoes[patientId] = [];
                
                const nova = { id: Utils.uid(), ...data, createdAt: new Date().toISOString() };
                evolucoes[patientId].push(nova);
                evolucoes[patientId].sort((a, b) => b.date.localeCompare(a.date));
                this.save(evolucoes);
                return nova;
            },

            update(patientId, evolucaoId, updates) {
                const evolucoes = this.getAll();
                if (!evolucoes[patientId]) return null;
                
                const index = evolucoes[patientId].findIndex(e => e.id === evolucaoId);
                if (index !== -1) {
                    evolucoes[patientId][index] = {
                        ...evolucoes[patientId][index],
                        ...updates,
                        updatedAt: new Date().toISOString()
                    };
                    this.save(evolucoes);
                    return evolucoes[patientId][index];
                }
                return null;
            },

            delete(patientId, evolucaoId) {
                const evolucoes = this.getAll();
                if (evolucoes[patientId]) {
                    evolucoes[patientId] = evolucoes[patientId].filter(e => e.id !== evolucaoId);
                    if (evolucoes[patientId].length === 0) delete evolucoes[patientId];
                    this.save(evolucoes);
                }
            }

                                    ${this.pill(session.did === 'realizou' ? 'Realizou' : 'Não realizou', session.did === 'realizou' ? 'success' : 'error')}
                                    ${this.pill(session.paid === 'pago' ? 'Pago' : 'Não pago', session.paid === 'pago' ? 'success' : 'warning')}

            evolucaoCard(evolucao) {
                return `
                    <div class="timeline-item">
                        <div class="timeline-date">

                            ${Utils.escapeHtml(evolucao.text)}
                        </div>
                        <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.75rem;">
                            <button class="btn btn-sm btn-secondary" onclick="EvolucaoActions.openEdit('${evolucao.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="EvolucaoActions.delete('${evolucao.id}')">

                    </div>

        // ============================================
        // VIEWS (resumido - apenas o essencial)
        // ============================================
        const DashboardView = {
            render() {
                Tokens.verificarZerarMensal();
                
                const hoje = Utils.todayISO();
                const agora = Utils.nowTime();
                const hojeSessions = Sessions.getByDate(hoje);
                
                this.renderHoje(hojeSessions);
                this.renderProximos(agora);
                this.renderFinanceiro(hojeSessions);
                this.renderTaxaFaltas(hoje);
                this.renderTokens(hojeSessions);
                this.renderAniversariantes();
                this.renderProximosAtendimentos();
            },

            renderHoje(sessions) {
                const realizadas = sessions.filter(s => s.did === 'realizou').length;
                const faltas = sessions.filter(s => s.did === 'nao').length;
                
                $('dashHoje').textContent = sessions.length;
                $('dashHojeDetalhe').innerHTML = `${realizadas} realizadas • ${faltas} faltas`;
            },

            renderProximos(agora) {
                const hojeDay = new Date().getDay();
                const schedule = Schedule.get();
                const proximos = [];
                
                Object.entries(schedule.recurring || {}).forEach(([key, entry]) => {
                    const [day, time] = key.split('|');
                    if (parseInt(day) === hojeDay) {
                        const [h1, m1] = time.split(':').map(Number);
                        const [h2, m2] = agora.split(':').map(Number);
                        const diff = (h1 * 60 + m1) - (h2 * 60 + m2);
                        
                        if (diff > 0 && diff <= 15) {
                            const patient = Patients.getById(entry.patientId);
                            proximos.push({ name: patient?.name || '?', time });
                        }
                    }
                });
                
                $('dashProximos').textContent = proximos.length;
                $('dashProximosNomes').innerHTML = proximos.map(p => `${p.time} - ${p.name}`).join('<br>') || 'Nenhum';
            },

            renderFinanceiro(sessions) {
                const faturamento = sessions
                    .filter(s => s.did === 'realizou' && s.paid === 'pago')
                    .reduce((sum, s) => sum + (Number(s.value) || 0), 0);
                
                const aReceber = sessions
                    .filter(s => s.did === 'realizou' && s.paid !== 'pago')
                    .reduce((sum, s) => sum + (Number(s.value) || 0), 0);
                
                $('dashFaturamento').textContent = Utils.fmtMoney(faturamento);
                $('dashFaturamentoDetalhe').innerHTML = `
                    <div>💰 Recebido: ${Utils.fmtMoney(faturamento)}</div>
                    <div>💸 A receber: ${Utils.fmtMoney(aReceber)}</div>
                `;
            },

            renderTaxaFaltas(hoje) {
                const month = hoje.slice(0, 7);
                const stats = Sessions.getMonthStats(month);
                const taxa = stats.total ? ((stats.faltas / stats.total) * 100).toFixed(1) : 0;
                
                $('dashTaxaFaltas').textContent = `${taxa}%`;
                $('dashProgresso').style.width = `${taxa}%`;
            },

            renderTokens(sessions) {
                const patients = Patients.getAll();
                
                const cassemsHoje = sessions.filter(s => {
                    const p = patients.find(pat => pat.id === s.patientId);
                    return p?.serviceType === 'cassems';
                });

                const tokens = Tokens.getAll();
                const enviados = cassemsHoje.filter(s => tokens[s.id]?.status === 'enviado').length;
                const pendentes = cassemsHoje.length - enviados;

                $('tokensHoje').textContent = cassemsHoje.length;
                $('tokensHojeDetalhe').innerHTML = `${cassemsHoje.length} pacientes`;
                $('tokensEnviados').textContent = enviados;
                $('tokensPendentes').textContent = pendentes;
            },

            renderAniversariantes() {
                $('aniversariantes').innerHTML = '<div class="muted">Nenhum aniversariante</div>';
            },

            renderProximosAtendimentos() {
                $('proximosAtendimentos').innerHTML = '<div class="muted">Nenhum agendamento</div>';
            }
        };

        // ============================================
        // EVOLUCAO ACTIONS COM IA
        // ============================================
        const EvolucaoActions = {
            openModal() {
                if (!openedPatientId) return;
                $('evolucaoData').value = Utils.todayISO();
                $('evolucaoTexto').value = '';
                $('evolucaoModal').classList.remove('hidden');
                
                // Mostrar sugestões da IA
                this.showAISuggestions();
            },

            async showAISuggestions() {
                const container = document.getElementById('aiSuggestions');
                if (!container) return;
                
                container.innerHTML = '<div class="ai-loading"></div> Carregando sugestões...';
                
                const suggestions = await AIService.suggestEvolucao(openedPatientId);
                
                if (suggestions) {
                    const suggestionsList = suggestions.split('\n').filter(s => s.trim());
                    container.innerHTML = `
                        <h4><i class="fas fa-robot"></i> Sugestões da IA</h4>
                        ${suggestionsList.map(s => 
                            `<span class="suggestion-chip" onclick="EvolucaoActions.useSuggestion('${s.replace(/'/g, "\\'")}')">${s}</span>`
                        ).join('')}
                    `;
                } else {
                    container.innerHTML = '<div class="muted">Não foi possível carregar sugestões</div>';
                }
            },

            useSuggestion(text) {
                $('evolucaoTexto').value = text;
            },

            async improveText() {
                const textarea = $('evolucaoTexto');
                const currentText = textarea.value;
                
                if (!currentText) {
                    Utils.showAlert('Digite algum texto primeiro', 'warning');
                    return;
                }
                
                const improved = await AIService.improveEvolucao(currentText);
                if (improved) {
                    textarea.value = improved;
                    Utils.showAlert('Texto melhorado!', 'success');
                }
            },

            async summarizeText() {
                const textarea = $('evolucaoTexto');
                const currentText = textarea.value;
                
                if (!currentText) {
                    Utils.showAlert('Digite algum texto primeiro', 'warning');
                    return;
                }
                
                const summary = await AIService.summarizeEvolucao(currentText);
                if (summary) {
                    textarea.value = summary;
                    Utils.showAlert('Resumo criado!', 'success');
                }
            },

            save() {
                if (!openedPatientId) return;
                
                const data = $('evolucaoData').value;
                const texto = $('evolucaoTexto').value.trim();
                
                if (!texto) {
                    Utils.showAlert('Escreva a evolução', 'warning');
                    return;
                }
                
                Evolucoes.add(openedPatientId, { date: data, text: texto });
                Modals.closeEvolucao();
                PatientsView.openFolder(openedPatientId);
                Utils.showAlert('Evolução registrada!', 'success');
            },

            openEdit(evolucaoId) {
                if (!openedPatientId) return;
                
                const evolucoes = Evolucoes.getByPatient(openedPatientId);
                const evolucao = evolucoes.find(e => e.id === evolucaoId);
                if (!evolucao) return;
                
                currentEvolucaoId = evolucaoId;
                $('editEvolucaoData').value = evolucao.date;
                $('editEvolucaoTexto').value = evolucao.text;
                $('editEvolucaoModal').classList.remove('hidden');
            },

            saveEdit() {
                if (!openedPatientId || !currentEvolucaoId) return;
                
                const data = $('editEvolucaoData').value;
                const texto = $('editEvolucaoTexto').value.trim();
                
                if (!texto) {
                    Utils.showAlert('Escreva a evolução', 'warning');
                    return;
                }
                
                Evolucoes.update(openedPatientId, currentEvolucaoId, { date: data, text: texto });
                Modals.closeEditEvolucao();
                PatientsView.openFolder(openedPatientId);
                Utils.showAlert('Evolução atualizada!', 'success');
            },

            delete(evolucaoId) {
                if (!openedPatientId) return;
                if (!confirm('Excluir esta evolução?')) return;
                
                Evolucoes.delete(openedPatientId, evolucaoId);
                PatientsView.openFolder(openedPatientId);
                Utils.showAlert('Evolução excluída!', 'success');
            },

            closeModal() {
                $('evolucaoModal').classList.add('hidden');
            },

            closeEditModal() {
                $('editEvolucaoModal').classList.add('hidden');
                currentEvolucaoId = null;
            }
        };

        // ============================================

        // ============================================
        const Modals = {
            openEvolucao() { EvolucaoActions.openModal(); },
            closeEvolucao() { EvolucaoActions.closeModal(); },
            saveEvolucao() { EvolucaoActions.save(); },
            closeEditEvolucao() { EvolucaoActions.closeEditModal(); },
