        // ============================================
        // PATIENT ACTIONS
        // ============================================
        const PatientActions = {
            add() {
                const name = $('cName')?.value.trim();
                if (!name) {
                    Utils.showAlert('Nome é obrigatório', 'warning');
                    return;
                }

                const phone = $('cPhone')?.value || '';
                const serviceType = $('cServiceType')?.value || 'particular';
                const value = Utils.parseMoney($('cValue')?.value);
                
                const startDate = $('cStartDate')?.value || Utils.todayISO();
                const endDate = $('cEndDate')?.value || Utils.addDays(Utils.todayISO(), 30);

                const horarios = ScheduleForm.coletarHorarios();
                
                const patient = Patients.add({
                    name,
                    phone,
                    serviceType,
                    defaultValue: value,
                    horarios,
                    startDate,
                    endDate,
                    notes: $('cNotes')?.value || ''
                });

                if (horarios.length > 0) {
                    horarios.forEach(h => {
                        Schedule.addRecurring(h.dia, h.horario, patient.id, patient.serviceType);
                    });
                }

                if (currentPhotoFile) {
                    Photos.set(patient.id, currentPhotoFile);
                }

                this.clearForm();
                this.refreshAll();
                Utils.showAlert(`Paciente ${name} cadastrado!`, 'success');
            },

            rename() {
                const patients = Patients.getAll();
                const idx = patients.findIndex(p => p.id === openedPatientId);
                
                if (idx >= 0) {
                    const newName = prompt('Novo nome:', patients[idx].name);
                    if (newName) {
                        Patients.update(openedPatientId, { name: newName.trim() });
                        PatientsView.openFolder(openedPatientId);
                        this.refreshAll();
                        Utils.showAlert('Nome atualizado!', 'success');
                    }
                }
            },

            delete() {
                if (!confirm('Excluir paciente e todo histórico?')) return;
                
                Patients.delete(openedPatientId);
                
                const sessions = Sessions.getAll().filter(s => s.patientId !== openedPatientId);
                Sessions.save(sessions);
                
                Schedule.removeByPatient(openedPatientId);
                Photos.remove(openedPatientId);
                
                const evolucoes = Evolucoes.getAll();
                delete evolucoes[openedPatientId];
                Evolucoes.save(evolucoes);

                PatientsView.closeFolder();
                this.refreshAll();
                Utils.showAlert('Paciente excluído!', 'success');
            },

            openAnamnese() {
                const p = Patients.getById(openedPatientId);
                if (p) {
                    $('aQueixa').value = p.anamnese?.queixa || '';
                    $('aHistorico').value = p.anamnese?.historico || '';
                    $('aObs').value = p.anamnese?.obs || '';
                    $('anamneseModal').classList.remove('hidden');
                }
            },

            saveAnamnese() {
                const anamnese = {
                    queixa: $('aQueixa')?.value || '',
                    historico: $('aHistorico')?.value || '',
                    obs: $('aObs')?.value || ''
                };
                
                if (Patients.saveAnamnese(openedPatientId, anamnese)) {
                    $('anamneseModal').classList.add('hidden');
                    Utils.showAlert('Anamnese salva!', 'success');
                }
            },

            openWhatsApp() {
                const p = Patients.getById(openedPatientId);
                if (p?.phone) {
                    window.open(`https://wa.me/55${p.phone}`, '_blank');
                } else {
                    Utils.showAlert('Sem WhatsApp', 'warning');
                }
            },

            handlePhotoUpload(input) {
                const file = input.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPhotoFile = e.target.result;
                    const preview = $('photoPreview');
                    const placeholder = $('photoPlaceholder');
                    if (preview) {
                        preview.src = e.target.result;
                        preview.classList.remove('hidden');
                    }
                    if (placeholder) {
                        placeholder.classList.add('hidden');
                    }
                };
                reader.readAsDataURL(file);
            },

            clearForm() {
                $('cName').value = '';
                $('cPhone').value = '';
                $('cValue').value = '';
                $('cNotes').value = '';
                $('cStartDate').value = Utils.todayISO();
                $('cEndDate').value = Utils.addDays(Utils.todayISO(), 30);
                
                currentPhotoFile = null;
                $('photoPreview')?.classList.add('hidden');
                $('photoPlaceholder')?.classList.remove('hidden');

                const container = document.getElementById('horariosContainer');
                if (container) container.innerHTML = '';
            },

            refreshAll() {
                DailyView.renderPatientSelect();
                PatientsView.renderFolders();
                ScheduleView.render();
                DashboardView.render();
            },

            openFolder(id) { PatientsView.openFolder(id); }
        };

        // ============================================
        // SESSION ACTIONS
        // ============================================
        const SessionActions = {
            toggleDid(id) {
                if (Sessions.toggleDid(id)) {
                    this.refreshAll();
                    Utils.showAlert('Sessão atualizada!', 'success');
                }
            },

            togglePaid(id) {
                if (Sessions.togglePaid(id)) {
                    this.refreshAll();
                    Utils.showAlert('Pagamento atualizado!', 'success');
                }
            },

            editValue(id) {
                const session = Sessions.getById(id);
                if (!session) return;
                
                const newValue = prompt('Novo valor (R$):', session.value);
                if (newValue !== null) {
                    Sessions.updateValue(id, Utils.parseMoney(newValue));
                    this.refreshAll();
                    Utils.showAlert('Valor atualizado!', 'success');
                }
            },

            delete(id) {
                if (!confirm('Excluir esta sessão?')) return;
                
                Sessions.delete(id);
                Tokens.deleteBySession(id);
                
                this.refreshAll();
                Utils.showAlert('Sessão excluída!', 'success');
            },

            add() {
                const date = $('date')?.value;
                const patientId = $('pPatient')?.value;
                const time = $('pTime')?.value;
                const did = $('pDid')?.value;
                const just = $('pJust')?.value;
                const paid = $('pPaid')?.value;
                const manualValue = $('pValue')?.value;

                if (!date || !patientId) {
                    Utils.showAlert('Selecione data e paciente', 'warning');
                    return;
                }

                const p = Patients.getById(patientId);
                let value = manualValue ? Utils.parseMoney(manualValue) : Patients.getDefaultValue(patientId);

                const session = {
                    id: Utils.uid(),
                    date, patientId, time,
                    did,
                    just: did === 'nao' ? (just === 'na' ? 'nao_justificada' : just) : 'na',
                    paid, value
                };

                Sessions.add(session);

                if (p?.serviceType === 'cassems') {
                    Tokens.register(session.id, {
                        sessionId: session.id,
                        date,
                        patientName: p.name,
                        code: '',
                        status: 'pendente'
                    });
                }

                $('pTime').value = '';
                $('pValue').value = '';
                
                this.refreshAll();
                Utils.showAlert('Sessão adicionada!', 'success');
            },

            refreshAll() {
                DailyView.render();
                DashboardView.render();
                ScheduleView.render();
                if (openedPatientId) PatientsView.openFolder(openedPatientId);
            }
        };

        // ============================================
        // DAILY VIEW
        // ============================================
        const DailyView = {
            render() {
                Tokens.verificarZerarMensal();
                
                const date = $('date')?.value || Utils.todayISO();
                const search = $('search')?.value.toLowerCase() || '';
                
                this.renderSessionsList(date, search);
                this.renderSummary(date);
            },

            renderSessionsList(date, search) {
                const sessions = Sessions.getByDate(date);
                const patients = Patients.getAll();
                const tokens = Tokens.getAll();
                
                const filtered = sessions.filter(s => {
                    const p = patients.find(pat => pat.id === s.patientId);
                    return !search || (p?.name || '').toLowerCase().includes(search);
                });
                
                const list = $('dayList');
                if (!list) return;
                
                if (filtered.length === 0) {
                    list.innerHTML = '<div class="muted" style="text-align: center; padding: 2rem;">Nenhuma sessão</div>';
                    return;
                }
                
                list.innerHTML = filtered.map(s => {
                    const p = patients.find(pat => pat.id === s.patientId);
                    const token = tokens[s.id];
                    const photo = Photos.get(s.patientId);
                    return Components.sessionCard(s, p, token, photo, true);
                }).join('');
            },

            renderSummary(date) {
                const sessions = Sessions.getByDate(date);
                
                $('sumDay').innerHTML = `Total: ${sessions.length}`;
                $('sumMoney').innerHTML = `Total: ${Utils.fmtMoney(sessions.reduce((s, r) => s + (Number(r.value) || 0), 0))}`;
                $('sumAbsences').innerHTML = sessions.filter(s => s.did === 'nao').length.toString();
            },

            renderPatientSelect() {
                const patients = Patients.getAll();
                const sel = $('pPatient');
                if (!sel) return;
                
                sel.innerHTML = patients.length ?
                    patients.map(p => `<option value="${p.id}">${Utils.escapeHtml(p.name)}${p.serviceType === 'cassems' ? ' (Cassems)' : ''}</option>`).join('') :
                    '<option value="">(Cadastre pacientes)</option>';
            },

            clearDay() {
                const date = $('date')?.value;
                if (!date) return;
                
                if (confirm(`Limpar todas as sessões de ${Utils.formatDate(date)}?`)) {
                    const sessions = Sessions.getAll().filter(s => s.date !== date);
                    Sessions.save(sessions);
                    
                    Sessions.getByDate(date).forEach(s => Tokens.deleteBySession(s.id));
                    
                    this.render();
                    DashboardView.render();
                    ScheduleView.render();
                    Utils.showAlert('Dia limpo!', 'success');
                }
            },

            findInDay() {
                const term = $('search')?.value.toLowerCase() || '';
                const patient = Patients.getAll().find(p => p.name.toLowerCase().includes(term));
                
                if (patient) {
                    $('pPatient').value = patient.id;
                    Utils.showAlert(`Paciente selecionado: ${patient.name}`, 'success');
                }
                
                this.render();
            }
        };

        // ============================================
        // SCHEDULE VIEW
        // ============================================
        const ScheduleView = {
            render() {
                Tokens.verificarZerarMensal();
                
                const schedule = Schedule.get();
                const times = schedule.times || [];
                const patients = Patients.getAll();
                const sessions = Sessions.getAll();
                
                const stats = {};
                sessions.forEach(s => {
                    if (!stats[s.patientId]) {
                        stats[s.patientId] = { realizadas: 0, faltas: 0, total: 0 };
                    }
                    if (s.did === 'realizou') stats[s.patientId].realizadas++;
                    else if (s.did === 'nao') stats[s.patientId].faltas++;
                    stats[s.patientId].total++;
                });

                this.renderTable(times, patients, stats);
            },

            renderTable(times, patients, stats) {
                const recurring = Schedule.getRecurring();
                const table = $('schedTable');
                if (!table) return;

                let html = '<thead><tr><th>Horário</th>';
                DAYS.forEach(day => html += `<th>${day}</th>`);
                html += '</tr></thead><tbody>';

                for (const time of times) {
                    html += `<tr><td style="font-weight: 600;">${time}</td>`;

                    for (let day = 0; day < 7; day++) {
                        const key = Utils.recurKey(day, time);
                        const entry = recurring[key];
                        
                        if (entry) {
                            const patient = patients.find(p => p.id === entry.patientId);
                            const serviceType = SERVICE_TYPES[patient?.serviceType] || SERVICE_TYPES.particular;
                            
                            html += `
                                <td data-day="${day}" data-time="${time}" class="schedule-slot ${serviceType.class}">
                                    <strong>${Utils.escapeHtml(patient?.name || '?')}</strong>
                                    <div style="font-size: 0.875rem;">${serviceType.label}</div>
                                </td>
                            `;
                        } else {
                            html += `
                                <td data-day="${day}" data-time="${time}" class="schedule-slot slot-empty">
                                    <div style="text-align: center;">🟥 Vago</div>
                                </td>
                            `;
                        }
                    }
                    html += '</tr>';
                }

                html += '</tbody>';
                table.innerHTML = html;

                document.querySelectorAll('td[data-day]').forEach(td => {
                    td.addEventListener('click', (e) => {
                        const day = td.dataset.day;
                        const time = td.dataset.time;
                        ScheduleActions.handleSlotClick(parseInt(day), time);
                    });
                });
            },

            filterHoje() {
                const hoje = new Date().getDay();
                this.highlightDay(hoje);
            },

            filterAmanha() {
                const amanha = (new Date().getDay() + 1) % 7;
                this.highlightDay(amanha);
            },

            filterSemana() {
                document.querySelectorAll('#schedTable tbody tr td:not(.timeCell)').forEach(cell => {
                    cell.style.background = '';
                });
            },

            highlightDay(day) {
                document.querySelectorAll('#schedTable tbody tr').forEach(row => {
                    const cells = row.querySelectorAll('td:not(.timeCell)');
                    cells.forEach((cell, idx) => {
                        if (idx === day) {
                            cell.style.background = 'var(--primary-100)';
                        }
                    });
                });
            }
        };

        // ============================================
        // SCHEDULE ACTIONS
        // ============================================
        const ScheduleActions = {
            handleSlotClick(day, time) {
                const current = Schedule.getByDayTime(day, time);
                const patients = Patients.getAll();

                if (current) {
                    this.handleRemoveSlot(day, time, current);
                } else {
                    this.handleAddSlot(day, time, patients);
                }
            },

            handleRemoveSlot(day, time, current) {
                const patient = Patients.getById(current.patientId);
                if (confirm(`Remover ${patient?.name} deste horário?`)) {
                    Schedule.removeRecurring(day, time);
                    ScheduleView.render();
                    Utils.showAlert('Horário liberado!', 'success');
                }
            },

            handleAddSlot(day, time, patients) {
                const patientList = patients.map((p, i) => `${i + 1} - ${p.name}`).join('\n');
                const choice = prompt(
                    `Agendar em ${DAYS[day]} às ${time}\n\n` +
                    `Digite o NÚMERO do paciente:\n${patientList}\n\n` +
                    `Ou 0 para cancelar`
                );

                if (choice && choice !== '0') {
                    const idx = parseInt(choice) - 1;
                    if (idx >= 0 && idx < patients.length) {
                        const patient = patients[idx];
                        Schedule.addRecurring(day, time, patient.id, patient.serviceType);
                        ScheduleView.render();
                        Utils.showAlert(`${patient.name} agendado!`, 'success');
                    }
                }
            },

            addTime() {
                const time = $('newTime')?.value.trim();
                if (!time) return;
                
                if (!/^\d{1,2}:\d{2}$/.test(time)) {
                    Utils.showAlert('Formato inválido', 'warning');
                    return;
                }

                if (Schedule.addTime(time)) {
                    ScheduleView.render();
                    Utils.showAlert(`Horário ${time} adicionado!`, 'success');
                }
                
                $('newTime').value = '';
            }
        };

        // ============================================
        // TOKEN ACTIONS
        // ============================================
        const TokenActions = {
            openModal(sessionId, patientName, sessionDate) {
                currentTokenSessionId = sessionId;
                const token = Tokens.getBySession(sessionId);
                
                $('tokenDate').value = sessionDate;
                $('tokenPatient').value = patientName;
                $('tokenCode').value = token?.code || '';
                $('tokenStatus').value = token?.status || 'pendente';
                
                $('tokenModal').classList.remove('hidden');
            },

            saveToken() {
                if (!currentTokenSessionId) return;
                
                Tokens.register(currentTokenSessionId, {
                    sessionId: currentTokenSessionId,
                    date: $('tokenDate')?.value,
                    patientName: $('tokenPatient')?.value,
                    code: $('tokenCode')?.value,
                    status: $('tokenStatus')?.value
                });
                
                $('tokenModal').classList.add('hidden');
                DailyView.render();
                DashboardView.render();
                ScheduleView.render();
                Utils.showAlert('Token registrado!', 'success');
            },

            openManualModal(patientId) {
                const patient = Patients.getById(patientId);
                if (!patient) return;
                
                $('manualTokenPatientName').textContent = `Paciente: ${patient.name}`;
                
                const monthSelect = $('manualTokenMonth');
                monthSelect.innerHTML = '';
                
                const hoje = new Date();
                for (let i = -2; i <= 2; i++) {
                    const data = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
                    const value = `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, '0')}`;
                    const label = data.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = label;
                    if (i === 0) option.selected = true;
                    monthSelect.appendChild(option);
                }
                
                this.renderManualTokensList(patientId);
                $('manualTokenModal').classList.remove('hidden');
            },

            renderManualTokensList(patientId) {
                const container = $('manualTokensList');
                const tokens = Tokens.getByPatient(patientId);
                
                if (tokens.length === 0) {
                    container.innerHTML = '<div class="muted" style="text-align: center; padding: 2rem;">Nenhum token</div>';
                    return;
                }
                
                container.innerHTML = tokens.map(t => `
                    <div class="list-item" style="padding: 0.75rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                ${Components.pill(t.status === 'enviado' ? '✅ Enviado' : t.status === 'pendente' ? '⏳ Pendente' : '❌ Problema', 
                                    t.status === 'enviado' ? 'success' : t.status === 'pendente' ? 'warning' : 'error')}
                                <div style="font-size: 0.875rem;">${Utils.formatDate(t.date)}</div>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="TokenActions.deleteManual('${t.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            },

            addManual() {
                if (!openedPatientId) return;
                
                const monthSelect = $('manualTokenMonth');
                if (!monthSelect.value) {
                    Utils.showAlert('Selecione o mês', 'warning');
                    return;
                }
                
                Tokens.addManual(openedPatientId, monthSelect.value);
                this.renderManualTokensList(openedPatientId);
                Utils.showAlert('Token adicionado!', 'success');
            },

            deleteManual(tokenId) {
                if (!confirm('Remover este token?')) return;
                
                Tokens.delete(tokenId);
                
                if (openedPatientId) {
                    this.renderManualTokensList(openedPatientId);
                }
                
                Utils.showAlert('Token removido!', 'success');
            }
        };

        // ============================================
        // SCHEDULE FORM
        // ============================================
        const ScheduleForm = {
            updateDays() {
                const tipo = $('cBillingType')?.value;
                const container = document.getElementById('horariosContainer');
                if (!container) return;
                
                container.innerHTML = '';
                
                if (tipo === 'pack4') {

                            <i class="fas fa-plus"></i> Adicionar
                        </button>

            addIndividual() {
                const container = document.getElementById('horariosIndividuais');
                if (!container) return;
                
                const div = document.createElement('div');
                div.className = 'grid-2';
                div.style.marginBottom = '0.5rem';
                div.innerHTML = `
                    <select class="dia-individual form-control">
                        <option value="">Dia</option>
                        <option value="0">Segunda</option>
                        <option value="1">Terça</option>
                        <option value="2">Quarta</option>
                        <option value="3">Quinta</option>
                        <option value="4">Sexta</option>
                        <option value="5">Sábado</option>
                        <option value="6">Domingo</option>
                    </select>
                    <input type="time" class="hora-individual form-control" value="08:00" step="600">
                `;
                container.appendChild(div);
            },

            coletarHorarios() {
                const tipo = $('cBillingType')?.value;
                const horarios = [];
                
                if (tipo === 'pack4' || tipo === 'pack8') {
                    const qtd = tipo === 'pack4' ? 1 : 2;
                    for (let i = 0; i < qtd; i++) {
                        const dia = document.querySelector(`.dia-semana-${i}`);
                        const hora = document.querySelector(`.horario-${i}`);
                        if (dia && hora && dia.value) {
                            horarios.push({ dia: parseInt(dia.value), horario: hora.value });
                        }
                    }
                } else {
                    const dias = document.querySelectorAll('.dia-individual');
                    const horas = document.querySelectorAll('.hora-individual');
                    for (let i = 0; i < dias.length; i++) {
                        if (dias[i].value) {
                            horarios.push({ dia: parseInt(dias[i].value), horario: horas[i].value });
                        }
                    }
                }
                return horarios;
            }
        };

        // ============================================
        // UI
        // ============================================
        const Tabs = {
            set(tab) {
                $('viewDashboard')?.classList.toggle('hidden', tab !== 'dashboard');
                $('viewDaily')?.classList.toggle('hidden', tab !== 'daily');
                $('viewPatients')?.classList.toggle('hidden', tab !== 'patients');
                $('viewSchedule')?.classList.toggle('hidden', tab !== 'schedule');

                ['tabDashboard', 'tabDaily', 'tabPatients', 'tabSchedule'].forEach(id => {
                    $(id)?.classList.remove('active');
                });
                
                $(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`)?.classList.add('active');

                switch(tab) {
                    case 'dashboard': DashboardView.render(); break;
                    case 'schedule': ScheduleView.render(); break;
                }
            },

            init() {
                $('tabDashboard')?.addEventListener('click', () => this.set('dashboard'));
                $('tabDaily')?.addEventListener('click', () => this.set('daily'));
                $('tabPatients')?.addEventListener('click', () => this.set('patients'));
                $('tabSchedule')?.addEventListener('click', () => this.set('schedule'));
            }
        };

        const Shortcuts = {
            init() {
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey) {
                        switch (e.key) {
                            case 'n': e.preventDefault(); Tabs.set('patients'); $('cName')?.focus(); break;
                            case 'f': e.preventDefault(); 
                                if ($('viewDaily')?.classList.contains('hidden')) Tabs.set('daily');
                                $('search')?.focus(); 
                                break;
                            case '1': e.preventDefault(); Tabs.set('dashboard'); break;
                            case '2': e.preventDefault(); Tabs.set('daily'); break;
                            case '3': e.preventDefault(); Tabs.set('patients'); break;
                            case '4': e.preventDefault(); Tabs.set('schedule'); ScheduleView.render(); break;
                        }
                    }
                });
            },

            togglePanel() { $('shortcutsPanel')?.classList.toggle('hidden'); }
        };

            toggle() {
                document.body.classList.toggle('light-mode');
                const isLight = document.body.classList.contains('light-mode');
                Storage.save(STORAGE_KEYS.THEME, isLight ? 'light' : 'dark');
                $('themeToggle').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            },

            init() {
                const saved = Storage.load(STORAGE_KEYS.THEME);
                if (saved === 'light') {
                    document.body.classList.add('light-mode');
                    $('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
                }
            }
        };

                                    <div class="stat-label">⏳ Pendentes</div>
                                    <div class="stat-value" style="font-size: 1.5rem;" id="tokensPendentes">0</div>
                                </div>
                            </div>
                        </section>

                        <!-- DIÁRIO -->
                        <section id="viewDaily" class="hidden">
                            <div class="card">
                                <div class="grid-2" style="margin-bottom: 1.5rem;">
                                    <div class="form-group">
                                        <label class="form-label">Data</label>
                                        <input type="date" id="date" class="form-control" onchange="DailyView.render()">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Buscar</label>
                                        <div class="input-group">
                                            <input type="text" id="search" class="form-control" placeholder="Nome" oninput="DailyView.render()">
                                            <button class="btn btn-primary" onclick="DailyView.findInDay()"><i class="fas fa-search"></i></button>
                                            <button class="btn btn-danger" onclick="DailyView.clearDay()"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                </div>

                                <div class="grid-3" style="margin-bottom: 1.5rem;">
                                    <div class="cardMini">
                                        <div class="stat-label">Sessões</div>
                                        <div class="stat-value" style="font-size: 1.5rem;" id="sumDay">0</div>
                                    </div>
                                    <div class="cardMini">
                                        <div class="stat-label">Financeiro</div>
                                        <div class="stat-value" style="font-size: 1.5rem;" id="sumMoney">R$ 0</div>
                                    </div>
                                    <div class="cardMini">
                                        <div class="stat-label">Faltas</div>
                                        <div class="stat-value" style="font-size: 1.5rem;" id="sumAbsences">0</div>
                                    </div>
                                </div>

                                <hr>

                                <h3>➕ Adicionar Sessão</h3>
                                <div class="grid-2">
                                    <select id="pPatient" class="form-control" onchange="DailyView.updateDefaultHint()"></select>
                                    <input type="time" id="pTime" class="form-control">
                                    <select id="pDid" class="form-control">
                                        <option value="realizou">✅ Realizou</option>
                                        <option value="nao">❌ Não realizou</option>
                                    </select>
                                    <select id="pJust" class="form-control">
                                        <option value="na">—</option>
                                        <option value="justificada">📝 Justificada</option>
                                        <option value="nao_justificada">⚠️ Não justificada</option>
                                    </select>
                                    <select id="pPaid" class="form-control">
                                        <option value="nao_pago">💸 Não pago</option>
                                        <option value="pago">💰 Pago</option>
                                    </select>
                                    <input type="text" id="pValue" class="form-control" placeholder="Valor">
                                </div>

                                <button class="btn btn-primary" onclick="SessionActions.add()">Adicionar</button>

                                <div id="dayList" class="list" style="margin-top: 2rem;"></div>
                            </div>
                        </section>

                        <!-- PACIENTES -->
                        <section id="viewPatients" class="hidden">
                            <div class="grid-2">
                                <div class="card">
                                    <h3 class="card-title"><i class="fas fa-user-plus"></i> Novo Paciente</h3>
                                    
                                    <div class="photo-upload">
                                        <img id="photoPreview" class="avatar avatar-lg hidden">
                                        <div id="photoPlaceholder" class="avatar-placeholder avatar-lg">
                                            <i class="fas fa-camera"></i>
                                        </div>
                                        <input type="file" id="patientPhoto" accept="image/*" style="display: none;" onchange="PatientActions.handlePhotoUpload(this)">
                                        <button class="btn btn-sm btn-secondary" onclick="document.getElementById('patientPhoto').click()">
                                            <i class="fas fa-upload"></i> Foto
                                        </button>
                                    </div>

                                    <div class="grid-2">
                                        <input type="text" id="cName" class="form-control" placeholder="Nome *">
                                        <input type="tel" id="cPhone" class="form-control" placeholder="WhatsApp">
                                    </div>

                                    <div class="grid-2">
                                        <select id="cServiceType" class="form-control">
                                            <option value="particular">Particular</option>
                                            <option value="cassems">Cassems</option>
                                            <option value="unimed">Unimed</option>
                                            <option value="outros">Outros</option>
                                        </select>
                                        <input type="text" id="cValue" class="form-control" placeholder="Valor">
                                    </div>

                                    <div class="grid-2">
                                        <select id="cBillingType" class="form-control" onchange="ScheduleForm.updateDays()">
                                            <option value="pack4">4 sessões</option>
                                            <option value="pack8">8 sessões</option>
                                            <option value="individual">Individual</option>
                                        </select>
                                    </div>

                                    <div class="grid-2">
                                        <input type="date" id="cStartDate" class="form-control">
                                        <input type="date" id="cEndDate" class="form-control">
                                    </div>

                                    <div id="horariosContainer"></div>
                                    <textarea id="cNotes" class="form-control" rows="2" placeholder="Observações"></textarea>

                                    <button class="btn btn-primary" onclick="PatientActions.add()">Salvar</button>
                                </div>

                                <div class="card">
                                    <div id="foldersPane">
                                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                                            <input type="text" id="pSearch" class="form-control" placeholder="Buscar..." oninput="PatientsView.renderFolders()">
                                            <button id="onlyDebtFolders" class="btn btn-sm btn-secondary" onclick="PatientsView.toggleDebtFilter()">
                                                <i class="fas fa-dollar-sign"></i>
                                            </button>
                                        </div>
                                        <div id="patientFolders" class="list"></div>
                                    </div>

                                    <div id="folderOpenPane" class="hidden">
                                        <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                                            <button class="btn btn-sm btn-secondary" onclick="PatientsView.closeFolder()">
                                                <i class="fas fa-arrow-left"></i>
                                            </button>
                                            <img id="folderPatientPhoto" class="avatar avatar-sm hidden">
                                            <div style="flex: 1;">
                                                <h3 id="openPatientTitle" style="margin: 0;">Paciente</h3>
                                                <div class="muted" id="openPatientMeta"></div>
                                            </div>
                                            <div id="patientActionButtons"></div>
                                        </div>

                                        <div id="pacoteProgresso"></div>
                                        <div id="patientHistory" class="list"></div>
                                        <div id="evolucoesSection"></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- AGENDA -->
                        <section id="viewSchedule" class="hidden">
                            <div class="card">
                                <div class="grid-3" style="margin-bottom: 1rem;">
                                    <input type="date" id="schedRef" class="form-control" onchange="ScheduleView.render()">
                                    <div class="input-group">
                                        <input type="time" id="newTime" class="form-control" placeholder="07:00">
                                        <button class="btn btn-primary" onclick="ScheduleActions.addTime()"><i class="fas fa-plus"></i></button>
                                    </div>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <button class="btn btn-sm btn-secondary" onclick="ScheduleView.filterHoje()">Hoje</button>
                                        <button class="btn btn-sm btn-secondary" onclick="ScheduleView.filterAmanha()">Amanhã</button>
                                        <button class="btn btn-sm btn-secondary" onclick="ScheduleView.filterSemana()">Todos</button>
                                    </div>
                                </div>

                                <div class="table-container">
                                    <table id="schedTable"></table>
                                </div>
                            </div>
                        </section>
                    </main>

                    <div class="shortcuts-hint" onclick="Shortcuts.togglePanel()">
                        <i class="fas fa-keyboard"></i>
                    </div>
                    <div class="shortcuts-panel hidden" id="shortcutsPanel">
                        <h4>Atalhos</h4>
                        <div class="shortcut-item"><span>Novo paciente</span> <span class="shortcut-key">Ctrl+N</span></div>
                        <div class="shortcut-item"><span>Buscar</span> <span class="shortcut-key">Ctrl+F</span></div>
                        <div class="shortcut-item"><span>Dashboard</span> <span class="shortcut-key">Ctrl+1</span></div>
                        <div class="shortcut-item"><span>Diário</span> <span class="shortcut-key">Ctrl+2</span></div>
                        <div class="shortcut-item"><span>Pacientes</span> <span class="shortcut-key">Ctrl+3</span></div>
                        <div class="shortcut-item"><span>Agenda</span> <span class="shortcut-key">Ctrl+4</span></div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // MODAIS HTML
        // ============================================
        function renderModals() {
            const modals = `
                <!-- NOTIFICATION MODAL -->
                <div id="notificationModal" class="modal-overlay hidden">
                    <div class="modal">
                        <h3>🔔 Notificações</h3>
                        <p>Ativar lembretes de atendimento?</p>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="$('notificationModal').classList.add('hidden')">Agora não</button>
                            <button class="btn btn-primary" onclick="Notifications.requestPermission()">Ativar</button>
                        </div>
                    </div>
                </div>

                <!-- ANAMNESE MODAL -->
                <div id="anamneseModal" class="modal-overlay hidden">
                    <div class="modal">
                        <h3>📋 Anamnese</h3>
                        <textarea id="aQueixa" class="form-control" rows="2" placeholder="Queixa principal"></textarea>
                        <textarea id="aHistorico" class="form-control" rows="2" placeholder="Histórico"></textarea>
                        <textarea id="aObs" class="form-control" rows="3" placeholder="Observações"></textarea>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="$('anamneseModal').classList.add('hidden')">Fechar</button>
                            <button class="btn btn-primary" onclick="PatientActions.saveAnamnese()">Salvar</button>
                        </div>
                    </div>
                </div>

                <!-- TOKEN MODAL -->
                <div id="tokenModal" class="modal-overlay hidden">
                    <div class="modal">
                        <h3>🎫 Token</h3>
                        <input type="date" id="tokenDate" class="form-control" readonly>
                        <input type="text" id="tokenPatient" class="form-control" readonly>
                        <input type="text" id="tokenCode" class="form-control" placeholder="Código">
                        <select id="tokenStatus" class="form-control">
                            <option value="enviado">✅ Enviado</option>
                            <option value="pendente">⏳ Pendente</option>
                            <option value="problema">❌ Problema</option>
                        </select>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="$('tokenModal').classList.add('hidden')">Cancelar</button>
                            <button class="btn btn-primary" onclick="TokenActions.saveToken()">Salvar</button>
                        </div>
                    </div>
                </div>

                <!-- MANUAL TOKEN MODAL -->
                <div id="manualTokenModal" class="modal-overlay hidden">
                    <div class="modal">
                        <h3>🎫 Tokens Manuais</h3>
                        <p id="manualTokenPatientName"></p>
                        
                        <div class="grid-2" style="margin-bottom: 1rem;">
                            <select id="manualTokenMonth" class="form-control"></select>
                            <button class="btn btn-primary" onclick="TokenActions.addManual()">Adicionar</button>
                        </div>

                        <div id="manualTokensList" class="list"></div>
                        
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="$('manualTokenModal').classList.add('hidden')">Fechar</button>
                        </div>
                    </div>
                </div>

                <!-- EVOLUCAO MODAL COM IA -->
                <div id="evolucaoModal" class="modal-overlay hidden">
                    <div class="modal">
                        <h3><i class="fas fa-robot" style="color: #8b5cf6;"></i> Evolução com IA</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Data</label>
                            <input type="date" id="evolucaoData" class="form-control">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Evolução</label>
                            <textarea id="evolucaoTexto" class="form-control" rows="5" placeholder="Descreva a evolução..."></textarea>
                        </div>

                        <div class="ai-suggestions" id="aiSuggestions">
                            <h4><i class="fas fa-robot"></i> Sugestões da IA</h4>
                            <div class="ai-loading"></div> Carregando...
                        </div>

                        <div style="display: flex; gap: 0.5rem; margin: 1rem 0;">
                            <button class="btn btn-sm btn-ai" onclick="EvolucaoActions.improveText()">
                                <i class="fas fa-magic"></i> Melhorar
                            </button>
                            <button class="btn btn-sm btn-ai" onclick="EvolucaoActions.summarizeText()">
                                <i class="fas fa-compress"></i> Resumir
                            </button>
                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="EvolucaoActions.closeModal()">Cancelar</button>
                            <button class="btn btn-primary" onclick="EvolucaoActions.save()">Salvar</button>
                        </div>
                    </div>
                </div>

                <!-- EDIT EVOLUCAO MODAL -->
                <div id="editEvolucaoModal" class="modal-overlay hidden">
                    <div class="modal">
                        <h3>✏️ Editar Evolução</h3>
                        <input type="date" id="editEvolucaoData" class="form-control">
                        <textarea id="editEvolucaoTexto" class="form-control" rows="5"></textarea>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="EvolucaoActions.closeEditModal()">Cancelar</button>
                            <button class="btn btn-primary" onclick="EvolucaoActions.saveEdit()">Salvar</button>
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modals);
        }

        // ============================================
        // NOTIFICATIONS
        // ============================================
        const Notifications = {
            async requestPermission() {
                if (!('Notification' in window)) return;
                
                const permission = await Notification.requestPermission();
                notificationsEnabled = permission === 'granted';
                
                if (notificationsEnabled) {
                    Storage.save(STORAGE_KEYS.NOTIFICATIONS, 'granted');
                    Utils.showAlert('Notificações ativadas!', 'success');
                    $('notificationModal')?.classList.add('hidden');
                }
            },

            init() {
                const status = Storage.load(STORAGE_KEYS.NOTIFICATIONS);
                if (status === 'granted') {
                    notificationsEnabled = true;
                } else if (window.Notification && Notification.permission === 'granted') {
                    notificationsEnabled = true;
                    Storage.save(STORAGE_KEYS.NOTIFICATIONS, 'granted');
                } else if (window.Notification && Notification.permission !== 'denied') {
                    setTimeout(() => $('notificationModal')?.classList.remove('hidden'), 30000);
                }
            }
        };

        // ============================================
        // INIT
        // ============================================
        function init() {
            Storage.checkVersion();
            renderApp();
            renderModals();
            Theme.init();

            $('date').value = Utils.todayISO();
            $('schedRef').value = Utils.todayISO();
            $('cStartDate').value = Utils.todayISO();
            $('cEndDate').value = Utils.addDays(Utils.todayISO(), 30);
            
            $('today').innerHTML = new Date().toLocaleDateString('pt-BR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            Tokens.verificarZerarMensal();
            Notifications.init();

            $('importFile')?.addEventListener('change', (e) => {
                Storage.importFromFile(e.target.files[0], () => location.reload());
            });

            Shortcuts.init();
            Tabs.init();

            DailyView.renderPatientSelect();
            DailyView.render();
            PatientsView.renderFolders();
            ScheduleView.render();
            DashboardView.render();

            setTimeout(() => ScheduleForm.updateDays(), 100);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
