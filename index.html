<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicFlow Pro - Gestão de Clínica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Mesmo CSS da versão anterior - mantido igual */
        :root {
            --primary-50: #ecfdf5;
            --primary-100: #d1fae5;
            --primary-200: #a7f3d0;
            --primary-300: #6ee7b7;
            --primary-400: #34d399;
            --primary-500: #10b981;
            --primary-600: #059669;
            --primary-700: #047857;
            --primary-800: #065f46;
            --primary-900: #064e3b;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --gray-950: #0f172a;
            
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --error: #ef4444;
            --error-light: #fee2e2;
            --info: #3b82f6;
            --info-light: #dbeafe;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        .light-mode {
            --bg-primary: var(--gray-50);
            --bg-secondary: white;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            --card-bg: white;
            --hover-bg: var(--gray-50);
        }

        body {
            --bg-primary: var(--gray-950);
            --bg-secondary: var(--gray-900);
            --text-primary: white;
            --text-secondary: var(--gray-400);
            --border: var(--gray-800);
            --card-bg: var(--gray-900);
            --hover-bg: var(--gray-800);
            
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .hidden { display: none !important; }

        /* Estilos básicos - mesmo da versão anterior */
        .app { min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); }
        .header-content { max-width: 1440px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; font-weight: 600; box-shadow: var(--shadow-lg); }
        .logo-text h1 { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); margin: 0; }
        .logo-text p { font-size: 0.875rem; color: var(--text-secondary); margin: 0; }
        .header-actions { display: flex; align-items: center; gap: 1rem; }
        .date-display { padding: 0.5rem 1rem; background: var(--hover-bg); border-radius: var(--radius-lg); font-size: 0.875rem; color: var(--text-secondary); border: 1px solid var(--border); }
        .theme-toggle { padding: 0.5rem; background: var(--hover-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-secondary); cursor: pointer; }
        .backup-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--hover-bg); border: 1px solid var(--border); border-radius: var(--radius-full); }
        .nav-tabs { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 2rem; }
        .nav-container { max-width: 1440px; margin: 0 auto; display: flex; gap: 0.5rem; overflow-x: auto; }
        .nav-tab { padding: 1rem 1.5rem; background: transparent; border: none; color: var(--text-secondary); font-weight: 500; cursor: pointer; white-space: nowrap; }
        .nav-tab i { margin-right: 0.5rem; }
        .nav-tab:hover { color: var(--primary-500); }
        .nav-tab.active { color: var(--primary-500); }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--primary-500); }
        .main-content { flex: 1; max-width: 1440px; margin: 0 auto; padding: 2rem; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 1.5rem; box-shadow: var(--shadow-md); }
        .card-title { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin: 0 0 1rem 0; }
        .card-title i { color: var(--primary-500); margin-right: 0.5rem; }
        .cardMini { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; background: var(--hover-bg); }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .split { display: grid; grid-template-columns: 1fr 1.2fr; gap: 1.5rem; }
        @media (max-width: 1024px) { .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .grid-2, .grid-3, .grid-4, .split { grid-template-columns: 1fr; } .main-content { padding: 1rem; } }
        
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 1.5rem; }
        .stat-icon { width: 48px; height: 48px; background: var(--primary-50); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: var(--primary-600); font-size: 1.5rem; margin-bottom: 1rem; }
        .stat-label { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
        .stat-detail { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem; }
        
        .progress-bar { width: 100%; height: 8px; background: var(--hover-bg); border-radius: var(--radius-full); overflow: hidden; margin: 0.5rem 0; }
        .progress-fill { height: 100%; background: var(--primary-500); border-radius: var(--radius-full); transition: width 0.3s; }
        .circular-progress { width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(var(--primary-500) 0deg, var(--hover-bg) 0deg); display: flex; align-items: center; justify-content: center; position: relative; }
        .circular-progress::before { content: ''; position: absolute; width: 60px; height: 60px; border-radius: 50%; background: var(--card-bg); }
        .progress-value { position: relative; z-index: 1; font-weight: 600; color: var(--primary-500); }
        
        .btn { padding: 0.75rem 1.5rem; border-radius: var(--radius-lg); font-weight: 500; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary-500); color: white; }
        .btn-secondary { background: transparent; border-color: var(--border); color: var(--text-secondary); }
        .btn-ai { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .btn-danger { background: var(--error-light); color: var(--error-500); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); }
        .form-control { width: 100%; padding: 0.75rem 1rem; background: var(--hover-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-primary); }
        .input-group { display: flex; gap: 0.5rem; }
        .input-group .form-control { flex: 1; }
        
        .list { display: flex; flex-direction: column; gap: 0.75rem; }
        .list-item { background: var(--hover-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
        
        .pill { display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 500; background: var(--hover-bg); color: var(--text-secondary); border: 1px solid var(--border); }
        .pill-success { background: var(--success-light); color: var(--success); }
        .pill-warning { background: var(--warning-light); color: var(--warning); }
        .pill-error { background: var(--error-light); color: var(--error); }
        .pill-cassems { background: var(--cassems-light); color: var(--cassems); }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-500); }
        .avatar-lg { width: 80px; height: 80px; }
        .avatar-placeholder { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-100); display: flex; align-items: center; justify-content: center; color: var(--primary-600); }
        
        .schedWrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); max-height: 600px; }
        table.sched { width: 100%; min-width: 900px; border-collapse: collapse; }
        .sched th, .sched td { border: 1px solid var(--border); padding: 0.75rem; }
        .sched th { background: var(--hover-bg); position: sticky; top: 0; }
        .timeCell { position: sticky; left: 0; background: var(--hover-bg); font-weight: 600; }
        .slotBox { border-radius: var(--radius-md); padding: 0.75rem; cursor: pointer; }
        .slotGreen { background: var(--cassems-light); border-left: 4px solid var(--cassems); }
        .slotAmber { background: var(--particular-light); border-left: 4px solid var(--particular); }
        .slotRed { background: var(--hover-bg); border-left: 4px solid var(--border); }
        
        .token-counter { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--hover-bg); border-radius: var(--radius-lg); margin: 1rem 0; }
        .token-progress { flex: 1; height: 8px; background: var(--border); border-radius: var(--radius-full); }
        .token-progress-fill { height: 100%; background: var(--warning-500); border-radius: var(--radius-full); transition: width 0.3s; }
        
        .timeline { position: relative; padding-left: 2rem; }
        .timeline-item { position: relative; padding-bottom: 1.5rem; }
        .timeline-item::before { content: ''; position: absolute; left: -1.5rem; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item::after { content: ''; position: absolute; left: -1.65rem; top: 0.5rem; width: 0.75rem; height: 0.75rem; border-radius: 50%; background: var(--primary-500); border: 2px solid var(--card-bg); }
        
        .ai-suggestions { margin-top: 1rem; padding: 1rem; background: linear-gradient(135deg, #6366f110, #8b5cf610); border: 1px solid #8b5cf640; border-radius: var(--radius-lg); }
        .ai-suggestions h4 { color: #8b5cf6; margin: 0 0 0.5rem 0; display: flex; align-items: center; gap: 0.5rem; }
        .suggestion-chip { display: inline-block; padding: 0.5rem 1rem; margin: 0.25rem; background: var(--hover-bg); border: 1px solid var(--border); border-radius: var(--radius-full); font-size: 0.875rem; cursor: pointer; }
        .suggestion-chip:hover { background: #8b5cf6; color: white; }
        .ai-error { color: var(--error); padding: 1rem; text-align: center; background: var(--error-light); border-radius: var(--radius-lg); margin: 1rem 0; }
        .ai-offline { color: var(--warning); padding: 1rem; text-align: center; background: var(--warning-light); border-radius: var(--radius-lg); margin: 1rem 0; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-2xl); padding: 2rem; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
        .modal-footer { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; }
        
        .alert { position: fixed; top: 2rem; right: 2rem; padding: 1rem 1.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xl); z-index: 2000; animation: slideIn 0.3s ease; max-width: 400px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .shortcuts-hint { position: fixed; bottom: 2rem; right: 2rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-full); padding: 0.75rem 1.5rem; box-shadow: var(--shadow-lg); cursor: pointer; z-index: 100; backdrop-filter: blur(8px); }
        .shortcuts-panel { position: fixed; bottom: 5rem; right: 2rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 1.5rem; width: 320px; box-shadow: var(--shadow-xl); z-index: 100; backdrop-filter: blur(8px); }
        .shortcut-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .shortcut-key { padding: 0.25rem 0.5rem; background: var(--hover-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: monospace; }
    </style>
</head>
<body>
    <div id="app"></div>
    <input type="file" id="importFile" accept=".json" style="display:none">

    <script>
        // ============================================
        // CONFIGURAÇÕES
        // ============================================
        const APP_VERSION = '15.0.0';
        const CLINIC_NAME = "ClinicFlow Pro";
        const CLINIC_SUBTITLE = "Gestão de Clínica Profissional";
        const CLINIC_CRFA = "CRFa 5-13766";

        // SUA CHAVE API DO GEMINI (se não funcionar, o sistema funciona sem IA)
        const GEMINI_API_KEY = "AIzaSyA0WulpOSIW9YgQ80_5JvRXdcqQceXqp-8";

        const STORAGE_KEYS = {
            PATIENTS: "clinicflow_patients_v15",
            SESSIONS: "clinicflow_sessions_v15",
            SCHEDULE: "clinicflow_schedule_v15",
            TOKENS: "clinicflow_tokens_v15",
            THEME: "clinicflow_theme_v15",
            VERSION: "clinicflow_version",
            NOTIFICATIONS: "clinicflow_notifications",
            PHOTOS: "clinicflow_photos",
            EVOLUCOES: "clinicflow_evolucoes",
            ULTIMO_RESET: "clinicflow_ultimo_reset"
        };

        const DAYS = ["Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom"];
        
        const SERVICE_TYPES = {
            cassems: { label: 'Cassems', class: 'slotGreen', pill: 'pill-cassems' },
            particular: { label: 'Particular', class: 'slotAmber', pill: 'pill-warning' },
            unimed: { label: 'Unimed', class: 'slotBlue', pill: 'pill-info' },
            outros: { label: 'Outros', class: 'slotPurple', pill: 'pill-info' }
        };

        const DEFAULT_TIMES = [
            "07:00", "07:40", "08:20", "09:00", "09:40", "10:20", "11:00",
            "13:00", "13:40", "14:20", "15:00", "15:40", "16:20", "17:00", "17:40"
        ];

        const CASSEMS_DEFAULT_VALUE = 26;

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let openedPatientId = null;
        let alertTimeout = null;
        let currentTokenSessionId = null;
        let debtFilterActive = false;
        let notificationsEnabled = false;
        let notificationInterval = null;
        let currentPhotoFile = null;
        let deferredPrompt = null;
        let currentEvolucaoId = null;
        let aiEnabled = false; // Começa como false, testa a API

        // ============================================
        // UTILS
        // ============================================
        const $ = (id) => document.getElementById(id);

        const Utils = {
            uid() { return Date.now().toString(36) + Math.random().toString(36).substring(2); },
            todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; },
            nowTime() { const d = new Date(); return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`; },
            parseMoney(val) { if (!val) return 0; return Number(String(val).replace(/\./g, '').replace(',', '.')) || 0; },
            fmtMoney(val) { return Number(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); },
            escapeHtml(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); },
            recurKey(day, time) { return `${day}|${time}`; },
            addDays(dateStr, days) { const date = new Date(dateStr + 'T12:00:00'); date.setDate(date.getDate() + days); return date.toISOString().split('T')[0]; },
            formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('pt-BR'); },

            showAlert(message, type = 'success', duration = 3000) {
                if (alertTimeout) clearTimeout(alertTimeout);
                const alert = document.createElement('div');
                alert.className = `alert alert-${type}`;
                alert.innerHTML = `<div style="display: flex; align-items: center; gap: 0.75rem;"><i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-exclamation-circle'}"></i><span>${message}</span></div>`;
                document.body.appendChild(alert);
                alertTimeout = setTimeout(() => { if (alert.parentNode) alert.remove(); }, duration);
            }
        };

        // ============================================
        // STORAGE (resumido para economizar espaço)
        // ============================================
        const Storage = {
            save(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); return true; } catch { return false; } },
            load(key, def = null) { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; } catch { return def; } },
            remove(key) { localStorage.removeItem(key); },
            
            exportAll() {
                try {
                    const dados = {
                        pacientes: Patients.getAll(),
                        sessoes: Sessions.getAll(),
                        agenda: Schedule.get(),
                        tokens: Tokens.getAll(),
                        fotos: Photos.getAll(),
                        evolucoes: Evolucoes.getAll(),
                        dataExport: new Date().toISOString(),
                        versao: APP_VERSION
                    };
                    const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_clinicflow_${Utils.todayISO()}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    Utils.showAlert('Backup exportado!', 'success');
                } catch { Utils.showAlert('Erro ao exportar', 'error'); }
            },

            importFromFile(file, callback) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const dados = JSON.parse(e.target.result);
                        if (dados.pacientes) this.save(STORAGE_KEYS.PATIENTS, dados.pacientes);
                        if (dados.sessoes) this.save(STORAGE_KEYS.SESSIONS, dados.sessoes);
                        if (dados.agenda) this.save(STORAGE_KEYS.SCHEDULE, dados.agenda);
                        if (dados.tokens) this.save(STORAGE_KEYS.TOKENS, dados.tokens);
                        if (dados.fotos) this.save(STORAGE_KEYS.PHOTOS, dados.fotos);
                        if (dados.evolucoes) this.save(STORAGE_KEYS.EVOLUCOES, dados.evolucoes);
                        Utils.showAlert('Dados importados!', 'success');
                        if (callback) setTimeout(callback, 1500);
                    } catch { Utils.showAlert('Arquivo inválido', 'error'); }
                };
                reader.readAsText(file);
            },

            checkVersion() {
                const lastVersion = this.load(STORAGE_KEYS.VERSION);
                if (lastVersion !== APP_VERSION) this.save(STORAGE_KEYS.VERSION, APP_VERSION);
            }
        };

        // ============================================
        // PHOTOS
        // ============================================
        const Photos = {
            getAll() { return Storage.load(STORAGE_KEYS.PHOTOS, {}); },
            save(photos) { Storage.save(STORAGE_KEYS.PHOTOS, photos); },
            get(patientId) { return this.getAll()[patientId] || null; },
            set(patientId, photoData) { const photos = this.getAll(); photos[patientId] = photoData; this.save(photos); },
            remove(patientId) { const photos = this.getAll(); delete photos[patientId]; this.save(photos); }
        };

        // ============================================
        // PATIENTS MODEL
        // ============================================
        const Patients = {
            getAll() { return Storage.load(STORAGE_KEYS.PATIENTS, []); },
            save(patients) { Storage.save(STORAGE_KEYS.PATIENTS, patients); },

            add(data) {
                const patients = this.getAll();
                const newPatient = { id: Utils.uid(), ...data, anamnese: { queixa: '', historico: '', obs: '' }, createdAt: new Date().toISOString() };
                patients.push(newPatient);
                this.save(patients);
                return newPatient;
            },

            update(id, updates) {
                const patients = this.getAll();
                const index = patients.findIndex(p => p.id === id);
                if (index !== -1) { patients[index] = { ...patients[index], ...updates }; this.save(patients); return patients[index]; }
                return null;
            },

            delete(id) { this.save(this.getAll().filter(p => p.id !== id)); },
            getById(id) { return this.getAll().find(p => p.id === id); },
            search(term) { const p = this.getAll(); if (!term) return p; return p.filter(p => p.name.toLowerCase().includes(term.toLowerCase())); },
            getAnamnese(id) { return this.getById(id)?.anamnese || { queixa: '', historico: '', obs: '' }; },
            saveAnamnese(id, data) { return this.update(id, { anamnese: data }); },
            isCassems(id) { return this.getById(id)?.serviceType === 'cassems'; },
            getDefaultValue(id) { const p = this.getById(id); if (p?.serviceType === 'cassems') return CASSEMS_DEFAULT_VALUE; return p?.defaultValue || 0; }
        };

        // ============================================
        // SESSIONS MODEL
        // ============================================
        const Sessions = {
            getAll() { return Storage.load(STORAGE_KEYS.SESSIONS, []); },
            save(sessions) { Storage.save(STORAGE_KEYS.SESSIONS, sessions); },

            add(data) { const sessions = this.getAll(); const newSession = { id: Utils.uid(), ...data }; sessions.push(newSession); this.save(sessions); return newSession; },
            update(id, updates) { const sessions = this.getAll(); const index = sessions.findIndex(s => s.id === id); if (index !== -1) { sessions[index] = { ...sessions[index], ...updates }; this.save(sessions); return sessions[index]; } return null; },
            delete(id) { this.save(this.getAll().filter(s => s.id !== id)); },
            getById(id) { return this.getAll().find(s => s.id === id); },
            getByDate(date) { return this.getAll().filter(s => s.date === date); },
            getByPatient(patientId) { return this.getAll().filter(s => s.patientId === patientId); },
            getByMonth(month) { return this.getAll().filter(s => s.date.startsWith(month)); },

            toggleDid(id) { const s = this.getById(id); if (!s) return null; const newDid = s.did === 'realizou' ? 'nao' : 'realizou'; return this.update(id, { did: newDid, just: newDid === 'nao' ? (s.just || 'nao_justificada') : 'na' }); },
            togglePaid(id) { const s = this.getById(id); if (!s) return null; return this.update(id, { paid: s.paid === 'pago' ? 'nao_pago' : 'pago' }); },
            updateValue(id, value) { return this.update(id, { value }); },

            getPatientStats(patientId) {
                const s = this.getByPatient(patientId);
                return { total: s.length, realizadas: s.filter(s => s.did === 'realizou').length, faltas: s.filter(s => s.did === 'nao').length, debt: s.filter(s => s.paid !== 'pago').reduce((sum, s) => sum + (Number(s.value) || 0), 0) };
            },

            getMonthStats(month) {
                const s = this.getByMonth(month);
                const r = s.filter(s => s.did === 'realizou');
                return { total: s.length, realizadas: r.length, faltas: s.filter(s => s.did === 'nao').length, faturamento: r.reduce((sum, s) => sum + (Number(s.value) || 0), 0), aReceber: s.filter(s => s.paid !== 'pago').reduce((sum, s) => sum + (Number(s.value) || 0), 0) };
            }
        };

        // ============================================
        // SCHEDULE MODEL
        // ============================================
        const Schedule = {
            get() { return Storage.load(STORAGE_KEYS.SCHEDULE, { times: DEFAULT_TIMES, recurring: {} }); },
            save(schedule) { Storage.save(STORAGE_KEYS.SCHEDULE, schedule); },
            getTimes() { return this.get().times || []; },

            addTime(time) { const s = this.get(); if (!s.times.includes(time)) { s.times.push(time); s.times.sort(); this.save(s); return true; } return false; },
            removeTime(time) { const s = this.get(); s.times = s.times.filter(t => t !== time); this.save(s); },
            resetTimes() { const s = this.get(); s.times = DEFAULT_TIMES; this.save(s); },
            getRecurring() { return this.get().recurring || {}; },

            addRecurring(day, time, patientId, serviceType) {
                const s = this.get(); if (!s.recurring) s.recurring = {};
                s.recurring[Utils.recurKey(day, time)] = { patientId, serviceType, startDate: Utils.todayISO() };
                this.save(s);
            },

            removeRecurring(day, time) { const s = this.get(); delete s.recurring[Utils.recurKey(day, time)]; this.save(s); },
            getByDayTime(day, time) { return this.getRecurring()[Utils.recurKey(day, time)] || null; },
            removeByPatient(patientId) { const s = this.get(); if (s.recurring) { Object.keys(s.recurring).forEach(key => { if (s.recurring[key].patientId === patientId) delete s.recurring[key]; }); this.save(s); } },

            getUpcoming(limit = 5) {
                const agora = Utils.nowTime();
                const refDay = new Date().getDay();
                const recurring = this.getRecurring();
                const patients = Patients.getAll();
                const result = [];
                
                Object.entries(recurring).forEach(([key, entry]) => {
                    const [day, time] = key.split('|');
                    const dayNum = parseInt(day);
                    const patient = patients.find(p => p.id === entry.patientId);
                    let daysToAdd = dayNum - refDay;
                    if (daysToAdd < 0) daysToAdd += 7;
                    if (daysToAdd === 0 && time < agora) daysToAdd += 7;
                    const nextDate = new Date();
                    nextDate.setDate(nextDate.getDate() + daysToAdd);
                    result.push({ date: nextDate, time, patient: patient?.name || '?', patientId: entry.patientId, days: daysToAdd });
                });
                
                return result.sort((a, b) => a.days - b.days).slice(0, limit);
            }
        };

        // ============================================
        // TOKENS MODEL
        // ============================================
        const Tokens = {
            getAll() { return Storage.load(STORAGE_KEYS.TOKENS, {}); },
            save(tokens) { Storage.save(STORAGE_KEYS.TOKENS, tokens); },
            getBySession(sessionId) { return this.getAll()[sessionId] || null; },

            register(sessionId, data) { const t = this.getAll(); t[sessionId] = { ...data, registeredAt: new Date().toISOString() }; this.save(t); return t[sessionId]; },
            updateStatus(tokenId, status) { const t = this.getAll(); if (t[tokenId]) { t[tokenId].status = status; this.save(t); return true; } return false; },
            delete(tokenId) { const t = this.getAll(); delete t[tokenId]; this.save(t); },
            deleteBySession(sessionId) { const t = this.getAll(); delete t[sessionId]; this.save(t); },

            addManual(patientId, month) {
                const [ano, mes] = month.split('-');
                const data = `${ano}-${mes}-01`;
                const id = Utils.uid();
                const t = this.getAll();
                t[id] = { id, patientId, date: data, code: '', status: 'pendente', manual: true, registeredAt: new Date().toISOString() };
                this.save(t);
                return t[id];
            },

            getByPatient(patientId) {
                const tokens = this.getAll();
                const sessions = Sessions.getAll();
                const result = [];
                Object.entries(tokens).forEach(([id, token]) => {
                    const session = sessions.find(s => s.id === id);
                    if (session && session.patientId === patientId) result.push({ id, ...token, sessionDate: session.date });
                    else if (!session && token.patientId === patientId) result.push({ id, ...token });
                });
                return result.sort((a, b) => b.date.localeCompare(a.date));
            },

            countByPatient(patientId, status, month = null) {
                const tokens = this.getByPatient(patientId);
                const hoje = new Date();
                const mesAlvo = month || `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
                return tokens.filter(t => {
                    if (status && t.status !== status) return false;
                    const dataToken = new Date(t.date + 'T12:00:00');
                    const mesToken = `${dataToken.getFullYear()}-${String(dataToken.getMonth() + 1).padStart(2, '0')}`;
                    return mesToken === mesAlvo;
                }).length;
            },

            countTotalEnviados(month = null) {
                const tokens = this.getAll();
                const hoje = new Date();
                const mesAlvo = month || `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
                return Object.values(tokens).filter(t => {
                    if (t.status !== 'enviado') return false;
                    const dataToken = new Date(t.date + 'T12:00:00');
                    const mesToken = `${dataToken.getFullYear()}-${String(dataToken.getMonth() + 1).padStart(2, '0')}`;
                    return mesToken === mesAlvo;
                }).length;
            },

            verificarZerarMensal() {
                const hoje = new Date();
                const dia = hoje.getDate();
                const mes = hoje.getMonth();
                const ano = hoje.getFullYear();
                const ultimoReset = Storage.load(STORAGE_KEYS.ULTIMO_RESET);
                const chaveReset = `${ano}-${mes}`;
                
                if (dia === 1 && ultimoReset !== chaveReset) {
                    const tokens = this.getAll();
                    const tokensReset = {};
                    Object.entries(tokens).forEach(([id, token]) => { if (token.status === 'problema') tokensReset[id] = token; });
                    this.save(tokensReset);
                    Storage.save(STORAGE_KEYS.ULTIMO_RESET, chaveReset);
                    Utils.showAlert('Tokens reiniciados', 'info');
                    return true;
                }
                return false;
            }
        };

        // ============================================
        // EVOLUCOES MODEL
        // ============================================
        const Evolucoes = {
            getAll() { return Storage.load(STORAGE_KEYS.EVOLUCOES, {}); },
            save(evolucoes) { Storage.save(STORAGE_KEYS.EVOLUCOES, evolucoes); },
            getByPatient(patientId) { return this.getAll()[patientId] || []; },

            add(patientId, data) {
                const e = this.getAll();
                if (!e[patientId]) e[patientId] = [];
                const nova = { id: Utils.uid(), ...data, createdAt: new Date().toISOString() };
                e[patientId].push(nova);
                e[patientId].sort((a, b) => b.date.localeCompare(a.date));
                this.save(e);
                return nova;
            },

            update(patientId, evolucaoId, updates) {
                const e = this.getAll();
                if (!e[patientId]) return null;
                const index = e[patientId].findIndex(ev => ev.id === evolucaoId);
                if (index !== -1) {
                    e[patientId][index] = { ...e[patientId][index], ...updates, updatedAt: new Date().toISOString() };
                    this.save(e);
                    return e[patientId][index];
                }
                return null;
            },

            delete(patientId, evolucaoId) {
                const e = this.getAll();
                if (e[patientId]) {
                    e[patientId] = e[patientId].filter(ev => ev.id !== evolucaoId);
                    if (e[patientId].length === 0) delete e[patientId];
                    this.save(e);
                }
            }
        };

        // ============================================
        // AI SERVICE CORRIGIDO
        // ============================================
        const AIService = {
            apiKey: GEMINI_API_KEY,
            apiUrl: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent',
            enabled: false,

            async testConnection() {
                if (!this.apiKey || this.apiKey === "AIzaSyA0WulpOSIW9YgQ80_5JvRXdcqQceXqp-8") {
                    console.log('IA desabilitada: chave não configurada');
                    return false;
                }

                try {
                    const response = await fetch(`${this.apiUrl}?key=${this.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: 'Teste' }] }],
                            generationConfig: { maxOutputTokens: 5 }
                        })
                    });

                    if (response.ok) {
                        this.enabled = true;
                        console.log('IA conectada com sucesso!');
                        return true;
                    } else {
                        console.log('Falha na conexão com IA:', response.status);
                        return false;
                    }
                } catch (error) {
                    console.log('Erro ao conectar com IA:', error);
                    return false;
                }
            },

            async generateText(prompt, fallbackToLocal = true) {
                if (!this.enabled) {
                    if (fallbackToLocal) {
                        return this.localFallback(prompt);
                    }
                    return null;
                }

                try {
                    const response = await fetch(`${this.apiUrl}?key=${this.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.7, maxOutputTokens: 500 }
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                        return data.candidates[0].content.parts[0].text;
                    }
                    throw new Error('Resposta inválida');
                } catch (error) {
                    console.error('Erro na API Gemini:', error);
                    if (fallbackToLocal) {
                        Utils.showAlert('Usando modo offline (IA local)', 'warning');
                        return this.localFallback(prompt);
                    }
                    return null;
                }
            },

            // Fallback local quando a IA não responde
            localFallback(prompt) {
                if (prompt.includes('Sugira 3 opções')) {
                    return `1. Paciente apresentou boa evolução na sessão de hoje, com melhora na articulação dos fonemas trabalhados. Participou ativamente das atividades propostas. Manter frequência das sessões.

2. Sessão produtiva com foco nos exercícios de motricidade orofacial. Paciente demonstrou maior consciência dos movimentos. Reforçar exercícios em casa.

3. Evolução satisfatória, com ganhos na produção dos sons alvo. Paciente colaborativo e atento durante toda a sessão. Próximos passos: introduzir novos fonemas.`;
                }
                
                if (prompt.includes('Melhore o seguinte texto')) {
                    const match = prompt.match(/Texto: "(.*)"/);
                    if (match && match[1]) {
                        return match[1] + " (versão profissional)";
                    }
                    return "Evolução registrada conforme protocolo clínico.";
                }
                
                if (prompt.includes('Resuma a seguinte')) {
                    const match = prompt.match(/Texto: "(.*)"/);
                    if (match && match[1]) {
                        return match[1].substring(0, 100) + "... (resumo)";
                    }
                    return "Resumo da evolução.";
                }
                
                return "Serviço de IA indisponível no momento.";
            },

            async suggestEvolucao(patientId, currentText = '') {
                const patient = Patients.getById(patientId);
                const evolucoes = Evolucoes.getByPatient(patientId);
                const historico = evolucoes.slice(0, 3).map(e => `- ${e.date}: ${e.text}`).join('\n');
                
                const prompt = `Você é um assistente de fonoaudiologia. Escreva evoluções clínicas.
                
Paciente: ${patient?.name || 'Paciente'}
Histórico:
${historico || 'Nenhuma'}

Sugira 3 opções de evolução profissional:`;

                return await this.generateText(prompt);
            },

            async improveEvolucao(text) {
                return await this.generateText(`Melhore o texto: "${text}"`);
            },

            async summarizeEvolucao(text) {
                return await this.generateText(`Resuma em 2 frases: "${text}"`);
            }
        };

        // ============================================
        // ACTIONS

        const SessionActions = {
            toggleDid(id) { if (Sessions.toggleDid(id)) { this.refreshAll(); Utils.showAlert('Sessão atualizada!'); } },
            togglePaid(id) { if (Sessions.togglePaid(id)) { this.refreshAll(); Utils.showAlert('Pagamento atualizado!'); } },
            editValue(id) { const s = Sessions.getById(id); if (s) { const v = prompt('Novo valor:', s.value); if (v !== null) { Sessions.updateValue(id, Utils.parseMoney(v)); this.refreshAll(); Utils.showAlert('Valor atualizado!'); } } },
            delete(id) { if (confirm('Excluir?')) { Sessions.delete(id); Tokens.deleteBySession(id); this.refreshAll(); Utils.showAlert('Sessão excluída!'); } },

            add() {
                const date = $('date')?.value;
                const patientId = $('pPatient')?.value;
                const time = $('pTime')?.value;
                const did = $('pDid')?.value;
                const paid = $('pPaid')?.value;
                const manualValue = $('pValue')?.value;

                if (!date || !patientId) { Utils.showAlert('Selecione data e paciente', 'warning'); return; }

                const p = Patients.getById(patientId);
                let value = manualValue ? Utils.parseMoney(manualValue) : Patients.getDefaultValue(patientId);

                const session = { id: Utils.uid(), date, patientId, time, did, just: did === 'nao' ? 'nao_justificada' : 'na', paid, value };
                Sessions.add(session);

                if (p?.serviceType === 'cassems') {
                    Tokens.register(session.id, { sessionId: session.id, date, patientName: p.name, code: '', status: 'pendente' });
                }

                $('pTime').value = ''; $('pValue').value = '';
                this.refreshAll();
                Utils.showAlert('Sessão adicionada!');

            refreshAll() { DailyView.render(); DashboardView.render(); ScheduleView.render(); if (openedPatientId) PatientsView.openFolder(openedPatientId); }
        };

        const PatientActions = {
            add() {
                const name = $('cName')?.value.trim();
                if (!name) { Utils.showAlert('Nome obrigatório', 'warning'); return; }

                const phone = $('cPhone')?.value || '';
                const serviceType = $('cServiceType')?.value || 'particular';
                const value = Utils.parseMoney($('cValue')?.value);
                const startDate = $('cStartDate')?.value || Utils.todayISO();
                const endDate = $('cEndDate')?.value || Utils.addDays(Utils.todayISO(), 30);

                const horarios = ScheduleForm.coletarHorarios();
                
                const patient = Patients.add({ name, phone, serviceType, defaultValue: value, horarios, startDate, endDate, notes: $('cNotes')?.value || '' });

                if (horarios.length > 0) {
                    horarios.forEach(h => Schedule.addRecurring(h.dia, h.horario, patient.id, patient.serviceType));
                }

                if (currentPhotoFile) Photos.set(patient.id, currentPhotoFile);

                PatientActions.clearForm();
                DailyView.renderPatientSelect();
                PatientsView.renderFolders();
                ScheduleView.render();
                DashboardView.render();
                Utils.showAlert(`Paciente ${name} cadastrado!`);
            },

            rename() {
                const patients = Patients.getAll();
                const idx = patients.findIndex(p => p.id === openedPatientId);
                if (idx >= 0) {
                    const newName = prompt('Novo nome:', patients[idx].name);
                    if (newName) { Patients.update(openedPatientId, { name: newName.trim() }); PatientsView.openFolder(openedPatientId); Utils.showAlert('Nome atualizado!'); }
                }
            },

            delete() {
                if (!confirm('Excluir paciente e todo histórico?')) return;
                Patients.delete(openedPatientId);
                Sessions.save(Sessions.getAll().filter(s => s.patientId !== openedPatientId));
                Schedule.removeByPatient(openedPatientId);
                Photos.remove(openedPatientId);
                const evolucoes = Evolucoes.getAll();
                delete evolucoes[openedPatientId];
                Evolucoes.save(evolucoes);
                PatientsView.closeFolder();
                DailyView.renderPatientSelect();
                PatientsView.renderFolders();
                ScheduleView.render();
                DashboardView.render();
                Utils.showAlert('Paciente excluído!');

            openAnamnese() {
                const p = Patients.getById(openedPatientId);
                if (p) {
                    $('aQueixa').value = p.anamnese?.queixa || '';
                    $('aHistorico').value = p.anamnese?.historico || '';
                    $('aObs').value = p.anamnese?.obs || '';

            saveAnamnese() {
                const anamnese = { queixa: $('aQueixa')?.value || '', historico: $('aHistorico')?.value || '', obs: $('aObs')?.value || '' };

                    $('anamneseModal').classList.add('hidden');

            handlePhotoUpload(input) {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentPhotoFile = e.target.result;
                    $('photoPreview').src = e.target.result;
                    $('photoPreview').classList.remove('hidden');
                    $('photoPlaceholder').classList.add('hidden');

                reader.readAsDataURL(file);

                $('cName').value = ''; $('cPhone').value = ''; $('cValue').value = ''; $('cNotes').value = '';
                $('cStartDate').value = Utils.todayISO(); $('cEndDate').value = Utils.addDays(Utils.todayISO(), 30);

                $('photoPreview')?.classList.add('hidden');
                $('photoPlaceholder')?.classList.remove('hidden');
                const container = document.getElementById('horariosContainer');
                if (container) container.innerHTML = '';

                $('evolucaoData').value = Utils.todayISO();
                $('evolucaoTexto').value = '';

                    container.innerHTML = `

                            <i class="fas fa-exclamation-triangle"></i> IA em modo offline
                            <div style="font-size: 0.875rem; margin-top: 0.5rem;">Usando sugestões locais</div>

            useSuggestion(text) { $('evolucaoTexto').value = text; },

            async improveText() {
                const textarea = $('evolucaoTexto');
                const currentText = textarea.value;

                if (improved) { textarea.value = improved; Utils.showAlert('Texto melhorado!'); }

                const textarea = $('evolucaoTexto');
                const currentText = textarea.value;
                if (!currentText) { Utils.showAlert('Digite algum texto', 'warning'); return; }
                
                const summary = await AIService.summarizeEvolucao(currentText);
                if (summary) { textarea.value = summary; Utils.showAlert('Resumo criado!'); }

                PatientsView.openFolder(openedPatientId);
                Utils.showAlert('Evolução registrada!');

                if (!evolucao) return;
                currentEvolucaoId = evolucaoId;
                $('editEvolucaoData').value = evolucao.date;
                $('editEvolucaoTexto').value = evolucao.text;
                $('editEvolucaoModal').classList.remove('hidden');

            saveEdit() {
                if (!openedPatientId || !currentEvolucaoId) return;
                const data = $('editEvolucaoData').value;
                const texto = $('editEvolucaoTexto').value.trim();
                if (!texto) { Utils.showAlert('Escreva a evolução', 'warning'); return; }
                
                Evolucoes.update(openedPatientId, currentEvolucaoId, { date: data, text: texto });
                this.closeEditModal();
                PatientsView.openFolder(openedPatientId);
                Utils.showAlert('Evolução atualizada!');

                $('manualTokenPatientName').textContent = `Paciente: ${patient.name}`;

                for (let i = -2; i <= 2; i++) {
                    const data = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
                    const value = `${data.getFullYear()}-${String(data.getMonth() + 1).padStart(2, '0')}`;
                    const label = data.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

                    option.value = value;
                    option.textContent = label;
                    if (i === 0) option.selected = true;
                    monthSelect.appendChild(option);
                }
                
                this.renderManualTokensList(patientId);
                $('manualTokenModal').classList.remove('hidden');
            },

            renderManualTokensList(patientId) {
                const container = $('manualTokensList');
                const tokens = Tokens.getByPatient(patientId);
                
                if (tokens.length === 0) {
                    container.innerHTML = '<div class="muted" style="text-align: center; padding: 2rem;">Nenhum token</div>';
                    return;
                }
                
                container.innerHTML = tokens.map(t => `
                    <div class="list-item" style="padding: 0.75rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <div>

                                    t.status === 'enviado' ? 'success' : t.status === 'pendente' ? 'warning' : 'error')}
                                <div>${Utils.formatDate(t.date)}</div>
                            </div>

            addManual() {
                if (!openedPatientId) return;
                const monthSelect = $('manualTokenMonth');
                if (!monthSelect.value) { Utils.showAlert('Selecione o mês', 'warning'); return; }
                Tokens.addManual(openedPatientId, monthSelect.value);
                this.renderManualTokensList(openedPatientId);
                Utils.showAlert('Token adicionado!');

            deleteManual(tokenId) {
                if (!confirm('Remover este token?')) return;

                if (openedPatientId) this.renderManualTokensList(openedPatientId);

        // ============================================
        // SCHEDULE VIEW
        // ============================================
        const ScheduleView = {
            render() {
                Tokens.verificarZerarMensal();
                const schedule = Schedule.get();
                const times = schedule.times || [];
                const patients = Patients.getAll();
                const recurring = Schedule.getRecurring();
                const table = $('schedTable');
                if (!table) return;

                let html = '<thead><tr><th>Horário</th>';
                DAYS.forEach(day => html += `<th>${day}</th>`);
                html += '</tr></thead><tbody>';

                for (const time of times) {
                    html += `<tr><td>${time}</td>`;
                    for (let day = 0; day < 7; day++) {
                        const entry = recurring[Utils.recurKey(day, time)];
                        if (entry) {
                            const patient = patients.find(p => p.id === entry.patientId);
                            const serviceType = SERVICE_TYPES[patient?.serviceType] || SERVICE_TYPES.particular;
                            html += `<td data-day="${day}" data-time="${time}" class="slotBox ${serviceType.class}"><strong>${Utils.escapeHtml(patient?.name || '?')}</strong><div>${serviceType.label}</div></td>`;
                        } else {
                            html += `<td data-day="${day}" data-time="${time}" class="slotBox slotRed"><div>🟥 Vago</div></td>`;
                        }
                    }
                    html += '</tr>';
                }
                html += '</tbody>';
                table.innerHTML = html;

                document.querySelectorAll('td[data-day]').forEach(td => {
                    td.addEventListener('click', (e) => {
                        const day = td.dataset.day;
                        const time = td.dataset.time;
                        ScheduleActions.handleSlotClick(parseInt(day), time);
                    });
                });
            }
        };

        const ScheduleActions = {
            handleSlotClick(day, time) {
                const current = Schedule.getByDayTime(day, time);
                const patients = Patients.getAll();

                if (current) {
                    const patient = Patients.getById(current.patientId);
                    if (confirm(`Remover ${patient?.name} deste horário?`)) {
                        Schedule.removeRecurring(day, time);
                        ScheduleView.render();
                        Utils.showAlert('Horário liberado!');
                    }
                } else {
                    const patientList = patients.map((p, i) => `${i + 1} - ${p.name}`).join('\n');
                    const choice = prompt(`Agendar em ${DAYS[day]} às ${time}\n\nDigite o NÚMERO do paciente:\n${patientList}\n\nOu 0 para cancelar`);
                    if (choice && choice !== '0') {
                        const idx = parseInt(choice) - 1;
                        if (idx >= 0 && idx < patients.length) {
                            const patient = patients[idx];
                            Schedule.addRecurring(day, time, patient.id, patient.serviceType);
                            ScheduleView.render();
                            Utils.showAlert(`${patient.name} agendado!`);
                        }
                    }
                }
            },

            addTime() {
                const time = $('newTime')?.value.trim();
                if (!time) return;
                if (!/^\d{1,2}:\d{2}$/.test(time)) { Utils.showAlert('Formato inválido', 'warning'); return; }
                if (Schedule.addTime(time)) { ScheduleView.render(); Utils.showAlert(`Horário ${time} adicionado!`); }
                $('newTime').value = '';
            }
        };

            async requestPermission() {
                if (!('Notification' in window)) return;
                const permission = await Notification.requestPermission();

                if (notificationsEnabled) {
                    Storage.save(STORAGE_KEYS.NOTIFICATIONS, 'granted');
                    Utils.showAlert('Notificações ativadas!');
                    $('notificationModal')?.classList.add('hidden');
                }
            },

            init() {
                const status = Storage.load(STORAGE_KEYS.NOTIFICATIONS);
                if (status === 'granted') {
                    notificationsEnabled = true;
                } else if (window.Notification && Notification.permission === 'granted') {
                    notificationsEnabled = true;
                    Storage.save(STORAGE_KEYS.NOTIFICATIONS, 'granted');
                } else if (window.Notification && Notification.permission !== 'denied') {
                    setTimeout(() => $('notificationModal')?.classList.remove('hidden'), 30000);
                }
            }
        };

                    container.innerHTML += `<div class="grid-2"><select class="dia-individual form-control"><option value="">Dia</option><option value="0">Segunda</option><option value="1">Terça</option><option value="2">Quarta</option><option value="3">Quinta</option><option value="4">Sexta</option><option value="5">Sábado</option><option value="6">Domingo</option></select><input type="time" class="hora-individual form-control" value="08:00"></div>`;
                }
            },

            coletarHorarios() {
                const tipo = $('cBillingType')?.value;
                const horarios = [];
                
                if (tipo === 'pack4' || tipo === 'pack8') {
                    const qtd = tipo === 'pack4' ? 1 : 2;
                    for (let i = 0; i < qtd; i++) {
                        const dia = document.querySelector(`.dia-semana-${i}`);
                        const hora = document.querySelector(`.horario-${i}`);
                        if (dia && hora && dia.value) horarios.push({ dia: parseInt(dia.value), horario: hora.value });
                    }
                } else {
                    const dias = document.querySelectorAll('.dia-individual');
                    const horas = document.querySelectorAll('.hora-individual');
                    for (let i = 0; i < dias.length; i++) {
                        if (dias[i].value) horarios.push({ dia: parseInt(dias[i].value), horario: horas[i].value });
                    }
                }
                return horarios;
            }
        };

                        if (e.key === 'f') { e.preventDefault(); Tabs.set('daily'); $('search')?.focus(); }

                        if (e.key === '2') { e.preventDefault(); Tabs.set('daily'); }

                <div id="manualTokenModal" class="modal-overlay hidden"><div class="modal"><h3>🎫 Tokens</h3><p id="manualTokenPatientName"></p><div class="grid-2"><select id="manualTokenMonth" class="form-control"></select><button class="btn btn-primary" onclick="TokenActions.addManual()">Adicionar</button></div><div id="manualTokensList" class="list"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="$('manualTokenModal').classList.add('hidden')">Fechar</button></div></div></div>
                <div id="evolucaoModal" class="modal-overlay hidden"><div class="modal"><h3><i class="fas fa-robot"></i> Evolução</h3><input type="date" id="evolucaoData" class="form-control"><textarea id="evolucaoTexto" class="form-control" rows="5" placeholder="Evolução..."></textarea><div class="ai-suggestions" id="aiSuggestions"></div><div style="display: flex; gap: 0.5rem;"><button class="btn btn-sm btn-ai" onclick="EvolucaoActions.improveText()"><i class="fas fa-magic"></i> Melhorar</button><button class="btn btn-sm btn-ai" onclick="EvolucaoActions.summarizeText()"><i class="fas fa-compress"></i> Resumir</button></div><div class="modal-footer"><button class="btn btn-secondary" onclick="EvolucaoActions.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="EvolucaoActions.save()">Salvar</button></div></div></div>
                <div id="editEvolucaoModal" class="modal-overlay hidden"><div class="modal"><h3>✏️ Editar</h3><input type="date" id="editEvolucaoData" class="form-control"><textarea id="editEvolucaoTexto" class="form-control" rows="5"></textarea><div class="modal-footer"><button class="btn btn-secondary" onclick="EvolucaoActions.closeEditModal()">Cancelar</button><button class="btn btn-primary" onclick="EvolucaoActions.saveEdit()">Salvar</button></div></div></div>
            `;
            document.body.insertAdjacentHTML('beforeend', modals);
        }

        // ============================================
        // INIT
        // ============================================
        async function init() {
            Storage.checkVersion();
            renderApp();
            renderModals();
            Theme.init();

            $('date').value = Utils.todayISO();
            $('schedRef').value = Utils.todayISO();
            $('cStartDate').value = Utils.todayISO();
            $('cEndDate').value = Utils.addDays(Utils.todayISO(), 30);
            $('today').innerHTML = new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            Tokens.verificarZerarMensal();
            Notifications.init();

            // Testar conexão com IA
            await AIService.testConnection();
            if (AIService.enabled) {
                console.log('✅ IA conectada com sucesso!');
            } else {
                console.log('ℹ️ IA em modo offline (usando fallback local)');
            }

            $('importFile')?.addEventListener('change', (e) => {
                Storage.importFromFile(e.target.files[0], () => location.reload());
            });

            Shortcuts.init();
            Tabs.init();

            DailyView.renderPatientSelect();
            DailyView.render();
            PatientsView.renderFolders();
            ScheduleView.render();
            DashboardView.render();

            setTimeout(() => ScheduleForm.updateDays(), 100);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
