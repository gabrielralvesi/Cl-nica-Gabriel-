        const Notifications = {
            async requestPermission() {
                if (!('Notification' in window)) {
                    Utils.showAlert('Navegador não suporta notificações', 'error');
                    return false;
                }
                
                const permission = await Notification.requestPermission();
                notificationsEnabled = permission === 'granted';
                
                if (notificationsEnabled) {
                    Storage.save(STORAGE_KEYS.NOTIFICATIONS, 'granted');
                    this.startChecker();
                    Utils.showAlert('Notificações ativadas!', 'success');
                    $('notificationModal')?.classList.add('hidden');
                }
                
                return notificationsEnabled;
            },

            startChecker() {
                if (notificationInterval) clearInterval(notificationInterval);
                notificationInterval = setInterval(() => this.checkUpcoming(), 60000);
            },

            checkUpcoming() {
                if (!notificationsEnabled) return;
                
                const agora = Utils.nowTime();
                const hoje = new Date().getDay();
                const schedule = Schedule.get();
                
                Object.entries(schedule.recurring || {}).forEach(([key, entry]) => {
                    const [day, time] = key.split('|');
                    if (parseInt(day) === hoje) {
                        const [h1, m1] = time.split(':').map(Number);
                        const [h2, m2] = agora.split(':').map(Number);
                        const diff = (h1 * 60 + m1) - (h2 * 60 + m2);
                        
                        if (diff === 15) {
                            const patient = Patients.getById(entry.patientId);
                            if (patient) {
                                new Notification('🔔 Próximo atendimento!', {
                                    body: `${patient.name} em 15 minutos (${time})`,
                                    silent: false
                                });
                            }
                        }
                    }
                });
            },

            init() {
                const status = Storage.load(STORAGE_KEYS.NOTIFICATIONS);
                if (status === 'granted') {
                    notificationsEnabled = true;
                    this.startChecker();
                } else if (window.Notification && Notification.permission === 'granted') {
                    notificationsEnabled = true;
                    Storage.save(STORAGE_KEYS.NOTIFICATIONS, 'granted');
                    this.startChecker();
                } else if (window.Notification && Notification.permission !== 'denied') {
                    setTimeout(() => $('notificationModal')?.classList.remove('hidden'), 30000);
                }
            }
        };

                $('themeToggle').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            },

            init() {
                const saved = Storage.load(STORAGE_KEYS.THEME);
                if (saved === 'light') {
                    document.body.classList.add('light-mode');
                    $('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';

        const PWA = {
            init() {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    $('installPWA').style.display = 'inline-block';
                });
            },

            install() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choice) => {
                        if (choice.outcome === 'accepted') {
                            Utils.showAlert('App instalado!', 'success');
                        }
                        deferredPrompt = null;
                        $('installPWA').style.display = 'none';
                    });
                }
            }
        };

                        </div>
                    </div>
                </div>

                <!-- TOKEN MODAL -->
                <div id="tokenModal" class="modal-overlay hidden">
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">🎫 Registrar Token</h2>
                            <button class="modal-close" onclick="Modals.closeToken()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label class="form-label">Data da sessão</label>
                                <input type="date" id="tokenDate" class="form-control" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Paciente</label>
                                <input type="text" id="tokenPatient" class="form-control" readonly>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Token de autorização</label>
                                <input type="text" id="tokenCode" class="form-control" placeholder="Ex: CASS-123456">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status do token</label>
                                <select id="tokenStatus" class="form-control">
                                    <option value="enviado">✅ Enviado</option>
                                    <option value="pendente">⏳ Pendente</option>
                                    <option value="problema">❌ Problema no token</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="Modals.closeToken()">Cancelar</button>
                            <button class="btn btn-primary" onclick="Modals.saveToken()">Salvar</button>
                        </div>
                    </div>
                </div>

                <!-- MANUAL TOKEN MODAL -->
                <div id="manualTokenModal" class="modal-overlay hidden">
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">🎫 Gerenciar Tokens Manuais</h2>
                            <button class="modal-close" onclick="Modals.closeManualToken()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <p class="muted" id="manualTokenPatientName"></p>
                            
                            <div style="margin: 1.5rem 0;">
                                <label class="form-label">Adicionar token manual</label>
                                <div class="grid-2">
                                    <select id="manualTokenMonth" class="form-control"></select>
                                    <button class="btn btn-primary" onclick="TokenActions.addManual()">
                                        <i class="fas fa-plus"></i> Adicionar
                                    </button>
                                </div>
                            </div>

                            <hr>

                            <div style="margin-top: 1.5rem;">
                                <label class="form-label">Tokens registrados</label>
                                <div id="manualTokensList" class="list" style="max-height: 300px; overflow-y: auto;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EVOLUCAO MODAL COM IA LOCAL -->
                <div id="evolucaoModal" class="modal-overlay hidden">
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title"><i class="fas fa-robot" style="color: #8b5cf6;"></i> Registrar Evolução com IA</h2>
                            <button class="modal-close" onclick="EvolucaoActions.closeModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label class="form-label">Data</label>
                                <input type="date" id="evolucaoData" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Evolução do paciente</label>
                                <textarea id="evolucaoTexto" class="form-control" rows="5" placeholder="Descreva a evolução..."></textarea>
                            </div>

                            <div class="ai-suggestions" id="aiSuggestions">
                                <h4><i class="fas fa-robot"></i> Sugestões da IA Local</h4>
                                <div class="ai-loading"></div> Gerando sugestões...
                            </div>

                            <div style="display: flex; gap: 0.5rem; margin: 1rem 0;">
                                <button class="btn btn-sm btn-ai" onclick="EvolucaoActions.improveText()">
                                    <i class="fas fa-magic"></i> Melhorar texto
                                </button>
                                <button class="btn btn-sm btn-ai" onclick="EvolucaoActions.summarizeText()">
                                    <i class="fas fa-compress"></i> Resumir
                                </button>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="EvolucaoActions.closeModal()">Cancelar</button>
                            <button class="btn btn-primary" onclick="EvolucaoActions.save()">Salvar</button>
                        </div>
                    </div>
                </div>

                <!-- EDIT EVOLUCAO MODAL -->
                <div id="editEvolucaoModal" class="modal-overlay hidden">
                    <div class="modal">
                        <div class="modal-header">
                            <h2 class="modal-title">✏️ Editar Evolução</h2>
                            <button class="modal-close" onclick="EvolucaoActions.closeEditModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label class="form-label">Data</label>
                                <input type="date" id="editEvolucaoData" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Evolução do paciente</label>
                                <textarea id="editEvolucaoTexto" class="form-control" rows="5" placeholder="Descreva a evolução..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="EvolucaoActions.closeEditModal()">Cancelar</button>
                            <button class="btn btn-primary" onclick="EvolucaoActions.saveEdit()">Salvar</button>
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modals);
        }

        // ============================================
        // INIT
        // ============================================
        function init() {
            Storage.checkVersion();
            renderApp();
            renderModals();
            Theme.init();

            $('date').value = Utils.todayISO();
            $('schedRef').value = Utils.todayISO();
            $('cStartDate').value = Utils.todayISO();
            $('cEndDate').value = Utils.addDays(Utils.todayISO(), 30);
            
            $('today').innerHTML = new Date().toLocaleDateString('pt-BR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            Tokens.verificarZerarMensal();
            Notifications.init();

            $('importFile')?.addEventListener('change', (e) => {
                Storage.importFromFile(e.target.files[0], () => location.reload());
            });

            PWA.init();
            Shortcuts.init();
            Tabs.init();

            DailyView.renderPatientSelect();
            DailyView.render();
            PatientsView.renderFolders();
            ScheduleView.render();
            DashboardView.render();
            ReportsView.generate();

            setTimeout(() => ScheduleForm.updateDays(), 100);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
